name: Lambda PR Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR so stale runs don't block merges.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'    # Matches Lambda Node.js 20.x runtime
  PYTHON_VERSION: '3.11' # Matches Lambda Python 3.11 runtime

# ---------------------------------------------------------------------------
# Job 0: Change detection
#
# Runs first and outputs a map of which Lambda directories have changed.
# Every downstream job reads these outputs to decide whether to run.
#
# Special rule: if `shared/` changes, ALL Node.js Lambda tests run because
# any Lambda may import from the shared module.
# ---------------------------------------------------------------------------
jobs:
  detect-changes:
    name: Detect Changed Lambdas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # Node.js Lambdas with tests
      bedrock:     ${{ steps.filter.outputs.bedrock }}
      # Chat-experience eval net (sub-phase 1.6). Gated NARROWLY on the files that
      # change eval outcomes — the prompt sources (V4 + V5), the V5 tail parser,
      # and the eval harness/scenarios — NOT all of
      # Bedrock_Streaming_Handler_Staging/**, so unrelated BSH changes
      # (e.g. form_handler.js) don't spend live Bedrock calls.
      eval_gate:   ${{ steps.filter.outputs.eval_gate }}
      meta_webhook:   ${{ steps.filter.outputs.meta_webhook }}
      meta_response:  ${{ steps.filter.outputs.meta_response }}
      calendar_watch_listener: ${{ steps.filter.outputs.calendar_watch_listener }}
      calendar_watch_onboarder: ${{ steps.filter.outputs.calendar_watch_onboarder }}
      calendar_watch_renewer: ${{ steps.filter.outputs.calendar_watch_renewer }}
      calendar_watch_offboarder: ${{ steps.filter.outputs.calendar_watch_offboarder }}
      booking_commit_handler: ${{ steps.filter.outputs.booking_commit_handler }}
      # These 3 SQS/lifecycle consumers had filters + matrix entries but were
      # never declared as outputs — so a change to ONLY their own dir (no
      # shared/** change) left the output empty and their suites silently
      # skipped. Declaring them here closes that pre-existing gap.
      calendar_event_consumer: ${{ steps.filter.outputs.calendar_event_consumer }}
      stranded_booking_remediator: ${{ steps.filter.outputs.stranded_booking_remediator }}
      calendar_lifecycle_consumer: ${{ steps.filter.outputs.calendar_lifecycle_consumer }}
      # Sub-phase E jest Lambdas (Reminder_Scheduler self-contained; Attendance
      # + Redemption import shared/scheduling/* so their filters add shared/**).
      reminder_scheduler: ${{ steps.filter.outputs.reminder_scheduler }}
      attendance_disposition_handler: ${{ steps.filter.outputs.attendance_disposition_handler }}
      scheduling_redemption_handler: ${{ steps.filter.outputs.scheduling_redemption_handler }}
      # WS-E-CI6 synthetic monitor (jest; self-contained — no shared imports).
      scheduling_synthetic_monitor: ${{ steps.filter.outputs.scheduling_synthetic_monitor }}
      # WS-E-OAUTH (E11) 3LO consent Lambda (jest; imports shared/scheduling/featureGate).
      calendar_oauth_connect: ${{ steps.filter.outputs.calendar_oauth_connect }}
      scheduling_page_api: ${{ steps.filter.outputs.scheduling_page_api }}
      # Attribution mint service (jest; self-contained — Wave 1 WS-B).
      attribution_mint_service: ${{ steps.filter.outputs.attribution_mint_service }}
      # Python Lambdas with tests
      meta_oauth:                ${{ steps.filter.outputs.meta_oauth }}
      master:                    ${{ steps.filter.outputs.master }}
      analytics_dashboard_api:   ${{ steps.filter.outputs.analytics_dashboard_api }}
      analytics_event_processor: ${{ steps.filter.outputs.analytics_event_processor }}
      attribution_aggregator:        ${{ steps.filter.outputs.attribution_aggregator }}
      attribution_recap_generator:   ${{ steps.filter.outputs.attribution_recap_generator }}
      attribution_unsubscribe:       ${{ steps.filter.outputs.attribution_unsubscribe }}
      ses_event_handler:             ${{ steps.filter.outputs.ses_event_handler }}
      send_email:                    ${{ steps.filter.outputs.send_email }}
      session_archiver:          ${{ steps.filter.outputs.session_archiver }}
      pii_dsar:                  ${{ steps.filter.outputs.pii_dsar }}
      pii_dsar_sla_monitor:      ${{ steps.filter.outputs.pii_dsar_sla_monitor }}
      pii_dsar_weekly_reminder:  ${{ steps.filter.outputs.pii_dsar_weekly_reminder }}
      pii_tenant_purge:          ${{ steps.filter.outputs.pii_tenant_purge }}
      # Node.js Lambda using node:test runner (no Jest)
      applier:        ${{ steps.filter.outputs.applier }}
      notification_hub: ${{ steps.filter.outputs.notification_hub }}
      scheduled_message_sender: ${{ steps.filter.outputs.scheduled_message_sender }}
      config_manager: ${{ steps.filter.outputs.config_manager }}
      # Shared module — triggers full Node.js test run when changed
      shared:         ${{ steps.filter.outputs.shared }}
      # True when shared/ changed (forces all Node.js tests)
      shared_changed: ${{ steps.filter.outputs.shared }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bedrock:
              - 'Bedrock_Streaming_Handler_Staging/**'
            eval_gate:
              # M2: the prompt trio lives in shared/prompt/ now.
              - 'shared/prompt/prompt_v4.js'
              - 'shared/prompt/prompt_v5.js'
              - 'shared/prompt/streamTail.js'
              - 'Bedrock_Streaming_Handler_Staging/scheduling/agentTurn.js'
              - 'Bedrock_Streaming_Handler_Staging/evals/**'
            meta_webhook:
              - 'Meta_Webhook_Handler/**'
            meta_response:
              - 'Meta_Response_Processor/**'
            calendar_watch_listener:
              - 'Calendar_Watch_Listener/**'
            calendar_watch_onboarder:
              - 'Calendar_Watch_Onboarder/**'
            calendar_watch_renewer:
              - 'Calendar_Watch_Renewer/**'
            calendar_watch_offboarder:
              - 'Calendar_Watch_Offboarder/**'
              # The CI-3c Booking.status vocabulary contract test lives in the
              # Offboarder suite and imports ../shared/booking-status.js. Include
              # shared/** so a vocabulary drift there trips this Lambda's test job
              # (phase-audit row GD — the tripwire was inert without this).
              - 'shared/**'
            booking_commit_handler:
              # C8 commit keystone. Imports shared/scheduling/* (pool/routing/
              # availability/tokens) + shared/booking-status, so a shared/** change
              # must trip this Lambda's test job.
              - 'Booking_Commit_Handler/**'
              - 'shared/**'
            calendar_event_consumer:
              # B9/B10 SQS consumer. Imports ../shared/booking-status (status
              # vocabulary), so shared/** drift must trip its test job.
              - 'Calendar_Event_Consumer/**'
              - 'shared/**'
            stranded_booking_remediator:
              # B11. Imports ../shared/scheduling/{availability,routing} +
              # ../shared/booking-status, so shared/** drift must trip it.
              - 'Stranded_Booking_Remediator/**'
              - 'shared/**'
            calendar_lifecycle_consumer:
              # WS-CAL-LIFECYCLE §14.2 consumer. Imports ../shared/booking-status.
              - 'Calendar_Lifecycle_Consumer/**'
              - 'shared/**'
            reminder_scheduler:
              # WS-E-REMIND. Self-contained (EventBridge Scheduler facade is
              # dependency-injected), so no shared/** trigger needed.
              - 'Reminder_Scheduler/**'
            attendance_disposition_handler:
              # WS-E-ATTEND. Imports ../shared/scheduling/{tokens,attendance,
              # escalation,zoomOutagePaging,featureGate}, so shared/** must trip it.
              - 'Attendance_Disposition_Handler/**'
              - 'shared/**'
            scheduling_redemption_handler:
              # Imports ../shared/scheduling/{tokens,featureGate,disposition},
              # so shared/** must trip it.
              - 'Scheduling_Redemption_Handler/**'
              - 'shared/**'
            scheduled_message_sender:
              # WS-E-REMIND dispatcher. node:test runner. Track 1 S3: now imports the FROZEN
              # §E3 gate shared/scheduling/channels.js, so a shared/** change must retest it.
              - 'Scheduled_Message_Sender/**'
              - 'shared/**'
            config_manager:
              # Messenger Product Surface P0a. node:test runner. Self-contained
              # (mergeStrategy.mjs has no shared/ imports), so no shared/** trigger.
              - 'Picasso_Config_Manager/**'
            scheduling_synthetic_monitor:
              # WS-E-CI6 synthetic monitor. Self-contained; no shared/** trigger.
              - 'Scheduling_Synthetic_Monitor/**'
            calendar_oauth_connect:
              # WS-E-OAUTH. Imports ../shared/scheduling/featureGate, so shared/** must trip it.
              - 'Calendar_OAuth_Connect/**'
              - 'shared/**'
            scheduling_page_api:
              # M1 deterministic picker gateway. Imports ../shared/scheduling/sessionBinding, so shared/** must trip it.
              - 'Scheduling_Page_Api/**'
              - 'shared/**'
            meta_oauth:
              - 'Meta_OAuth_Handler/**'
            master:
              - 'Master_Function_Staging/**'
            analytics_dashboard_api:
              - 'Analytics_Dashboard_API/**'
            analytics_event_processor:
              - 'Analytics_Event_Processor/**'
            attribution_aggregator:
              - 'Attribution_Aggregator/**'
            attribution_recap_generator:
              - 'Attribution_Recap_Generator/**'
            attribution_unsubscribe:
              - 'Attribution_Unsubscribe/**'
            ses_event_handler:
              - 'ses_event_handler/**'
            send_email:
              - 'send_email/**'
            session_archiver:
              - 'picasso_session_archiver/**'
            pii_dsar:
              - 'picasso_pii_dsar_staging/**'
            pii_dsar_sla_monitor:
              - 'picasso_pii_dsar_sla_monitor_staging/**'
            pii_dsar_weekly_reminder:
              - 'picasso_pii_dsar_weekly_reminder_staging/**'
            pii_tenant_purge:
              - 'picasso_pii_tenant_purge_staging/**'
            applier:
              - 'kb_proposal_applier/**'
            notification_hub:
              - 'notification_hub/**'
            attribution_mint_service:
              - 'Attribution_Mint_Service/**'
            shared:
              - 'shared/**'

  # ---------------------------------------------------------------------------
  # Job 1: Node.js Lambda Tests
  #
  # Matrix: one runner per Lambda that has tests.
  # Skipped entirely if none of the relevant directories changed.
  # If shared/ changed, all three Lambdas run regardless of their own diff.
  # ---------------------------------------------------------------------------
  node-tests:
    name: Node Tests — ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes
    # Run this job when:
    #   - shared/ changed (forces all Node.js tests), OR
    #   - the specific Lambda directory for this matrix entry changed.
    #
    # The per-entry `include.changed` field is set to the detect-changes output
    # for that Lambda. We combine it with the shared flag using a JS expression.
    if: |
      needs.detect-changes.outputs.shared == 'true'   ||
      needs.detect-changes.outputs.bedrock == 'true'  ||
      needs.detect-changes.outputs.meta_webhook == 'true' ||
      needs.detect-changes.outputs.meta_response == 'true' ||
      needs.detect-changes.outputs.calendar_watch_listener == 'true' ||
      needs.detect-changes.outputs.calendar_watch_onboarder == 'true' ||
      needs.detect-changes.outputs.calendar_watch_renewer == 'true' ||
      needs.detect-changes.outputs.calendar_watch_offboarder == 'true' ||
      needs.detect-changes.outputs.booking_commit_handler == 'true' ||
      needs.detect-changes.outputs.calendar_event_consumer == 'true' ||
      needs.detect-changes.outputs.stranded_booking_remediator == 'true' ||
      needs.detect-changes.outputs.calendar_lifecycle_consumer == 'true' ||
      needs.detect-changes.outputs.reminder_scheduler == 'true' ||
      needs.detect-changes.outputs.attendance_disposition_handler == 'true' ||
      needs.detect-changes.outputs.scheduling_redemption_handler == 'true' ||
      needs.detect-changes.outputs.scheduling_synthetic_monitor == 'true' ||
      needs.detect-changes.outputs.calendar_oauth_connect == 'true' ||
      needs.detect-changes.outputs.scheduling_page_api == 'true' ||
      needs.detect-changes.outputs.attribution_mint_service == 'true'

    strategy:
      fail-fast: false   # Test all Lambdas even if one fails
      matrix:
        include:
          - lambda: Bedrock_Streaming_Handler_Staging
            changed: ${{ needs.detect-changes.outputs.bedrock }}
          - lambda: Meta_Webhook_Handler
            changed: ${{ needs.detect-changes.outputs.meta_webhook }}
          - lambda: Meta_Response_Processor
            changed: ${{ needs.detect-changes.outputs.meta_response }}
          - lambda: Calendar_Watch_Listener
            changed: ${{ needs.detect-changes.outputs.calendar_watch_listener }}
          - lambda: Calendar_Watch_Onboarder
            changed: ${{ needs.detect-changes.outputs.calendar_watch_onboarder }}
          - lambda: Calendar_Watch_Renewer
            changed: ${{ needs.detect-changes.outputs.calendar_watch_renewer }}
          - lambda: Calendar_Watch_Offboarder
            changed: ${{ needs.detect-changes.outputs.calendar_watch_offboarder }}
          - lambda: Booking_Commit_Handler
            changed: ${{ needs.detect-changes.outputs.booking_commit_handler }}
          - lambda: Calendar_Event_Consumer
            changed: ${{ needs.detect-changes.outputs.calendar_event_consumer }}
          - lambda: Stranded_Booking_Remediator
            changed: ${{ needs.detect-changes.outputs.stranded_booking_remediator }}
          - lambda: Calendar_Lifecycle_Consumer
            changed: ${{ needs.detect-changes.outputs.calendar_lifecycle_consumer }}
          - lambda: Reminder_Scheduler
            changed: ${{ needs.detect-changes.outputs.reminder_scheduler }}
          - lambda: Attendance_Disposition_Handler
            changed: ${{ needs.detect-changes.outputs.attendance_disposition_handler }}
          - lambda: Scheduling_Redemption_Handler
            changed: ${{ needs.detect-changes.outputs.scheduling_redemption_handler }}
          - lambda: Scheduling_Synthetic_Monitor
            changed: ${{ needs.detect-changes.outputs.scheduling_synthetic_monitor }}
          - lambda: Calendar_OAuth_Connect
            changed: ${{ needs.detect-changes.outputs.calendar_oauth_connect }}
          - lambda: Scheduling_Page_Api
            changed: ${{ needs.detect-changes.outputs.scheduling_page_api }}
          - lambda: Attribution_Mint_Service
            changed: ${{ needs.detect-changes.outputs.attribution_mint_service }}
            # ESM (.mjs) jest suite — requires the vm-modules flag the local
            # `npm test` script sets; the CI step invokes npx jest directly.
            node_options: --experimental-vm-modules

    steps:
      - name: Skip unchanged Lambda (shared/ not changed either)
        # Individual Lambda skipping: if this specific Lambda didn't change AND
        # shared/ didn't change, print a notice and exit cleanly.
        if: |
          matrix.changed != 'true' &&
          needs.detect-changes.outputs.shared != 'true'
        run: |
          echo "No changes in ${{ matrix.lambda }} or shared/ — skipping."

      - name: Checkout
        if: |
          matrix.changed == 'true' ||
          needs.detect-changes.outputs.shared == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        if: |
          matrix.changed == 'true' ||
          needs.detect-changes.outputs.shared == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.lambda }}/package-lock.json

      - name: Install shared module dependencies
        if: |
          matrix.changed == 'true' ||
          needs.detect-changes.outputs.shared == 'true'
        working-directory: shared
        run: npm install

      - name: Install shared/scheduling deps (Booking_Commit_Handler + Stranded_Booking_Remediator + Calendar_Event_Consumer + Calendar_Lifecycle_Consumer + Attendance_Disposition_Handler + Scheduling_Redemption_Handler + Calendar_OAuth_Connect consume them)
        if: |
          (matrix.lambda == 'Booking_Commit_Handler' || matrix.lambda == 'Stranded_Booking_Remediator' || matrix.lambda == 'Calendar_Event_Consumer' || matrix.lambda == 'Calendar_Lifecycle_Consumer' || matrix.lambda == 'Attendance_Disposition_Handler' || matrix.lambda == 'Scheduling_Redemption_Handler' || matrix.lambda == 'Calendar_OAuth_Connect' || matrix.lambda == 'Scheduling_Page_Api') &&
          (matrix.changed == 'true' || needs.detect-changes.outputs.shared == 'true')
        working-directory: shared/scheduling
        run: npm install

      - name: Install dependencies
        if: |
          matrix.changed == 'true' ||
          needs.detect-changes.outputs.shared == 'true'
        working-directory: ${{ matrix.lambda }}
        run: npm install

      - name: Run Jest tests
        if: |
          matrix.changed == 'true' ||
          needs.detect-changes.outputs.shared == 'true'
        working-directory: ${{ matrix.lambda }}
        # --no-cache prevents stale transform cache.
        # --forceExit prevents hanging on open async handles from SDK mocks.
        # Jest 30 may exit 1 on open handles even when tests pass — the
        # --json output is authoritative, so we check success from that.
        shell: bash {0}
        env:
          # Empty for CJS suites; matrix entries opt in (e.g. ESM .mjs suites).
          NODE_OPTIONS: ${{ matrix.node_options || '' }}
        run: |
          npx jest --no-cache --forceExit --json --outputFile=/tmp/jest-results.json \
            --coverage --coverageReporters=text --coverageReporters=lcov 2>&1 || true
          python3 -c "
          import sys, json
          d = json.load(open('/tmp/jest-results.json'))
          passed = d.get('numPassedTests', 0)
          failed = d.get('numFailedTests', 0)
          suites = d.get('numPassedTestSuites', 0)
          total_suites = d.get('numTotalTestSuites', 0)
          print(f'Test Suites: {suites}/{total_suites} passed')
          print(f'Tests: {passed} passed, {failed} failed')
          sys.exit(0 if d.get('success') else 1)
          "

      - name: Upload test coverage
        # Always upload so coverage is available even when tests fail.
        if: |
          always() &&
          (matrix.changed == 'true' || needs.detect-changes.outputs.shared == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.lambda }}
          path: ${{ matrix.lambda }}/coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 1b: shared/scheduling library tests
  #
  # The shared/scheduling/ pure-logic modules (C4 availability, C5 routing,
  # C9 state machine, D1a tokens, …) ship their OWN jest suite + coverage gate.
  # The per-Lambda node-tests job runs jest inside each Lambda dir, so it never
  # executes shared/scheduling/__tests__/* — those tests were not gating. This
  # job runs that suite directly. Triggers on any shared/** change (the existing
  # `shared` filter), same trigger the Lambda suites use.
  #
  shared-scheduling-tests:
    name: Node Tests — shared/scheduling
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: shared/scheduling/package-lock.json

      - name: Install dependencies
        working-directory: shared/scheduling
        run: npm install

      - name: Run Jest tests (with coverage gate)
        working-directory: shared/scheduling
        # Mirror the node-tests job: --json output is authoritative because
        # Jest 30 can exit 1 on open SDK-mock handles even when tests pass.
        shell: bash {0}
        run: |
          npx jest --no-cache --forceExit --json --outputFile=/tmp/jest-sched.json \
            --coverage --coverageReporters=text --coverageReporters=lcov 2>&1 || true
          python3 -c "
          import sys, json
          d = json.load(open('/tmp/jest-sched.json'))
          passed = d.get('numPassedTests', 0)
          failed = d.get('numFailedTests', 0)
          suites = d.get('numPassedTestSuites', 0)
          total_suites = d.get('numTotalTestSuites', 0)
          print(f'Test Suites: {suites}/{total_suites} passed')
          print(f'Tests: {passed} passed, {failed} failed')
          sys.exit(0 if d.get('success') else 1)
          "

      - name: Upload coverage
        if: always() && needs.detect-changes.outputs.shared == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shared-scheduling
          path: shared/scheduling/coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 1c: shared/prompt library tests (M2 — the V5/V4 prompt trio lifted
  # from BSH). Carries the trio's coverage ratchets (transplanted from BSH's
  # jest.config.js). Pure modules, no SDK mocks/open handles — the plain jest
  # exit code is reliable here AND enforces the coverage thresholds (unlike
  # the JSON-gate pattern above, which is for suites with open-handle noise).
  #
  shared-prompt-tests:
    name: Node Tests — shared/prompt
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: shared/prompt/package-lock.json

      - name: Install dependencies
        working-directory: shared/prompt
        run: npm install

      - name: Run Jest tests (coverage thresholds enforced)
        working-directory: shared/prompt
        run: npx jest --no-cache --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shared-prompt
          path: shared/prompt/coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Python Lambda Tests
  #
  # Matrix: one runner per Python Lambda that has tests.
  # ---------------------------------------------------------------------------
  python-tests:
    name: Python Tests — ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes

    # AWS_DEFAULT_REGION mirrors the Lambda runtime environment so tests can
    # import handlers that construct boto3 clients at module load (eager region
    # resolution requires a region; without one, botocore raises NoRegionError).
    env:
      AWS_DEFAULT_REGION: us-east-1

    if: |
      needs.detect-changes.outputs.meta_oauth == 'true' ||
      needs.detect-changes.outputs.master == 'true' ||
      needs.detect-changes.outputs.analytics_dashboard_api == 'true' ||
      needs.detect-changes.outputs.analytics_event_processor == 'true' ||
      needs.detect-changes.outputs.attribution_aggregator == 'true' ||
      needs.detect-changes.outputs.attribution_recap_generator == 'true' ||
      needs.detect-changes.outputs.attribution_unsubscribe == 'true' ||
      needs.detect-changes.outputs.ses_event_handler == 'true' ||
      needs.detect-changes.outputs.session_archiver == 'true' ||
      needs.detect-changes.outputs.pii_dsar == 'true' ||
      needs.detect-changes.outputs.pii_dsar_sla_monitor == 'true' ||
      needs.detect-changes.outputs.pii_dsar_weekly_reminder == 'true' ||
      needs.detect-changes.outputs.pii_tenant_purge == 'true' ||
      needs.detect-changes.outputs.send_email == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - lambda: Meta_OAuth_Handler
            changed: ${{ needs.detect-changes.outputs.meta_oauth }}
            has_requirements: true
          - lambda: Master_Function_Staging
            changed: ${{ needs.detect-changes.outputs.master }}
            # Master_Function_Staging has no requirements.txt — boto3 and PyJWT
            # are provided by the Lambda runtime / layer at runtime.
            has_requirements: false
          - lambda: Analytics_Dashboard_API
            changed: ${{ needs.detect-changes.outputs.analytics_dashboard_api }}
            # Uses pyjwt-layer.zip layer at runtime; no top-level requirements.txt.
            has_requirements: false
          - lambda: Analytics_Event_Processor
            changed: ${{ needs.detect-changes.outputs.analytics_event_processor }}
            # boto3 from Lambda runtime; no requirements.txt.
            has_requirements: false
          - lambda: Attribution_Aggregator
            changed: ${{ needs.detect-changes.outputs.attribution_aggregator }}
            # boto3/zoneinfo from Lambda runtime + stdlib; no requirements.txt (Wave 1 WS-C).
            has_requirements: false
          - lambda: Attribution_Recap_Generator
            changed: ${{ needs.detect-changes.outputs.attribution_recap_generator }}
            # boto3 from Lambda runtime; no requirements.txt (Wave 2 WS-H).
            has_requirements: false
          - lambda: Attribution_Unsubscribe
            changed: ${{ needs.detect-changes.outputs.attribution_unsubscribe }}
            # boto3 from Lambda runtime; no requirements.txt (Wave 2 WS-I).
            has_requirements: false
          - lambda: ses_event_handler
            changed: ${{ needs.detect-changes.outputs.ses_event_handler }}
            # boto3 from Lambda runtime; no requirements.txt.
            has_requirements: false
          - lambda: send_email
            changed: ${{ needs.detect-changes.outputs.send_email }}
            # boto3 from Lambda runtime; no requirements.txt. 72 unit tests added —
            # was a live prod dep (invoked by Scheduled_Message_Sender) with zero CI.
            has_requirements: false
          - lambda: picasso_session_archiver
            changed: ${{ needs.detect-changes.outputs.session_archiver }}
            # boto3 from Lambda runtime; no requirements.txt.
            has_requirements: false
          - lambda: picasso_pii_dsar_staging
            changed: ${{ needs.detect-changes.outputs.pii_dsar }}
            # boto3 from Lambda runtime; no requirements.txt.
            # M2 Sprint B added to CI matrix (PR #157); 147 unit tests.
            has_requirements: false
          - lambda: picasso_pii_dsar_sla_monitor_staging
            changed: ${{ needs.detect-changes.outputs.pii_dsar_sla_monitor }}
            # boto3 from Lambda runtime; no requirements.txt.
            has_requirements: false
          - lambda: picasso_pii_dsar_weekly_reminder_staging
            changed: ${{ needs.detect-changes.outputs.pii_dsar_weekly_reminder }}
            # boto3 from Lambda runtime; no requirements.txt.
            has_requirements: false
          - lambda: picasso_pii_tenant_purge_staging
            changed: ${{ needs.detect-changes.outputs.pii_tenant_purge }}
            # boto3 from Lambda runtime; no requirements.txt (P1 Class A purge).
            has_requirements: false

    steps:
      - name: Skip unchanged Lambda
        if: matrix.changed != 'true'
        run: |
          echo "No changes in ${{ matrix.lambda }} — skipping."

      - name: Checkout
        if: matrix.changed == 'true'
        uses: actions/checkout@v4

      # Two setup steps because actions/setup-python@v5 errors when
      # cache-dependency-path doesn't match any file (no pyproject.toml fallback
      # exists in this repo). Lambdas without requirements.txt set up Python
      # without pip caching; the install (pytest + boto3) is fast enough that
      # the cache wouldn't save meaningful time anyway.
      - name: Setup Python ${{ env.PYTHON_VERSION }} (with pip cache)
        if: matrix.changed == 'true' && matrix.has_requirements == true
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ matrix.lambda }}/requirements.txt

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        if: matrix.changed == 'true' && matrix.has_requirements != true
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Lambda dependencies (requirements.txt)
        if: matrix.changed == 'true' && matrix.has_requirements == true
        working-directory: ${{ matrix.lambda }}
        run: pip install -r requirements.txt

      - name: Install pytest + boto3 + moto
        if: matrix.changed == 'true'
        # boto3 is needed at module-load for Python lambdas that have no
        # requirements.txt (their handlers import boto3 at the top level).
        # moto<5 pinned because Master_Function_Staging tests use the v4
        # decorator API (`mock_dynamodb`, `mock_ses`, etc.); moto v5+ replaced
        # those with a single `mock_aws` decorator. Migrating tests to v5 is
        # out of scope for this CI fix; pinning is the surgical fix.
        run: pip install pytest pytest-cov boto3 'moto<5'

      - name: Run pytest
        if: matrix.changed == 'true'
        working-directory: ${{ matrix.lambda }}
        env:
          # moto v4 best practice: explicit fake AWS credentials prevent
          # botocore from trying real-AWS auth before the mock activates.
          # Without these, tests that import boto3 at module level can
          # surface NoCredentialsError before the @mock_* decorator runs.
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_SESSION_TOKEN: testing
          AWS_DEFAULT_REGION: us-east-1
        # -v for verbose output; --tb=short keeps failures readable in CI.
        # Discover all test_*.py files in the Lambda directory.
        #
        # KNOWN TEST DEBT (Master_Function_Staging, surfaced 2026-05-02):
        # Once moto<5 was installed (this PR), 101 pre-existing logic
        # failures were exposed in test_form_handler.py, test_error_handling.py,
        # test_lambda_integration.py, test_notification_services.py,
        # test_sms_rate_limiting.py, test_dynamodb_operations.py,
        # test_contact_extractor.py, test_template_renderer.py. These were
        # hidden behind import-time collection errors before this PR. Each
        # file's failures are tech debt — production code drift, missing
        # @patch parameters, moto context scoping. Tracked separately for a
        # focused future session; not in scope for this CI infrastructure
        # repair.
        run: python -m pytest -v --tb=short --ignore=node_modules

      - name: Upload pytest results on failure
        if: failure() && matrix.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.lambda }}
          path: ${{ matrix.lambda }}/.pytest_cache/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2b: node:test-based Lambda Tests (matrix)
  #
  # Separate from the Jest matrix because these Lambdas use Node's built-in
  # test runner — zero deps, ESM-native. Adding Jest would mean babel + config
  # yak-shaving for no real benefit on small lambdas.
  #
  # When adding a new node:test-using Lambda: add it to the detect-changes
  # filter above, add a matrix entry here, and add its dir to the security
  # audit matrix below.
  # ---------------------------------------------------------------------------
  applier-tests:
    name: Node Tests — ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.applier == 'true' ||
      needs.detect-changes.outputs.notification_hub == 'true' ||
      needs.detect-changes.outputs.scheduled_message_sender == 'true' ||
      needs.detect-changes.outputs.config_manager == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - lambda: kb_proposal_applier
            changed: ${{ needs.detect-changes.outputs.applier }}
          - lambda: notification_hub
            changed: ${{ needs.detect-changes.outputs.notification_hub }}
          - lambda: Scheduled_Message_Sender
            changed: ${{ needs.detect-changes.outputs.scheduled_message_sender }}
          - lambda: Picasso_Config_Manager
            changed: ${{ needs.detect-changes.outputs.config_manager }}

    steps:
      - name: Skip unchanged lambda
        if: matrix.changed != 'true'
        run: echo "No changes in ${{ matrix.lambda }} — skipping."

      - name: Checkout
        if: matrix.changed == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        if: matrix.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        if: matrix.changed == 'true'
        working-directory: ${{ matrix.lambda }}
        run: npm install

      - name: Run node:test suite
        if: matrix.changed == 'true'
        working-directory: ${{ matrix.lambda }}
        run: node --test *.test.mjs

  # ---------------------------------------------------------------------------
  # Job 3: Security Audit
  #
  # npm audit for all Node.js Lambdas that have package-lock.json files.
  # Runs after tests pass. High-severity vulnerabilities fail the build.
  #
  # Documented exclusions (intentionally NOT in this matrix):
  #   - send_email:          Python (stdlib + boto3); no package.json/lockfile, so
  #                          nothing for npm audit to scan. Logic IS covered — see the
  #                          send_email python-tests entry above (72 unit tests; it is a
  #                          live prod dep invoked by Scheduled_Message_Sender).
  #   - SSO_Token_Generator: no package.json/lockfile; nothing for npm audit to scan.
  #   - n8n_scheduler_wake:  package.json with zero dependencies; no lockfile → no-op.
  #   - deploy_tenant_stack / ses_event_handler: Python, prod-only; no node deps.
  #   - picasso_pii_* :      Python; Terraform-provisioned (infra/modules/lambda-pii-*).
  # ---------------------------------------------------------------------------
  security:
    name: Security Audit — ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, node-tests]

    # Always run security audit when Node.js tests ran (or were skipped cleanly).
    # We audit all Node.js Lambdas — not just the ones that changed — because
    # a vulnerability reported upstream can affect any Lambda.
    if: always()

    strategy:
      fail-fast: false
      matrix:
        include:
          - lambda: Bedrock_Streaming_Handler_Staging
          - lambda: Meta_Webhook_Handler
          - lambda: Meta_Response_Processor
          - lambda: Picasso_Config_Manager   # node:test covers mergeStrategy logic (P0a); audit covers deps
          - lambda: SMS_Sender
          - lambda: SMS_Webhook_Handler
          - lambda: kb_proposal_applier      # node:test covers logic; audit covers deps
          - lambda: notification_hub        # node:test covers logic; audit covers deps
          - lambda: Calendar_Watch_Listener # B2 scheduling listener — jest tests + deps
          - lambda: Calendar_Watch_Onboarder # B5 onboarding hook — jest tests + deps
          - lambda: Calendar_Watch_Renewer # B3 watch-channel renewer — jest tests + deps
          - lambda: Calendar_Watch_Offboarder # B6 offboarding hook — jest tests + deps
          - lambda: Calendar_Event_Consumer # B9/B10 booking-event consumer — jest tests + deps
          - lambda: Stranded_Booking_Remediator # B11 stranded-booking remediator — jest tests + deps
          - lambda: Calendar_Lifecycle_Consumer # WS-CAL-LIFECYCLE §14.2 consumer — jest tests + deps
          - lambda: Reminder_Scheduler # WS-E-REMIND scheduler — jest tests + deps
          - lambda: Attendance_Disposition_Handler # WS-E-ATTEND — jest tests + deps
          - lambda: Scheduled_Message_Sender # WS-E-REMIND dispatcher — node:test + deps
          - lambda: Scheduling_Redemption_Handler # token redemption — jest tests + deps
          - lambda: Scheduling_Synthetic_Monitor # WS-E-CI6 synthetic monitor — jest tests + deps
          - lambda: Calendar_OAuth_Connect # WS-E-OAUTH 3LO consent — jest tests + deps
          - lambda: Scheduling_Page_Api # M1 deterministic picker gateway — jest tests + deps
          - lambda: Stripe_Webhook_Handler # payment webhook (HMAC auth, DDB + Secrets Manager); no tests yet — audit covers the @aws-sdk/* dep chain (has package-lock.json)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check package-lock.json exists
        id: lockfile_check
        working-directory: ${{ matrix.lambda }}
        run: |
          if [ -f package-lock.json ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
            echo "No package-lock.json in ${{ matrix.lambda }} — skipping audit."
          fi

      - name: Install production dependencies only
        if: steps.lockfile_check.outputs.has_lockfile == 'true'
        working-directory: ${{ matrix.lambda }}
        # --ignore-scripts prevents postinstall hooks from running in CI.
        run: npm install --omit=dev --ignore-scripts

      - name: Run npm audit (high severity)
        if: steps.lockfile_check.outputs.has_lockfile == 'true'
        working-directory: ${{ matrix.lambda }}
        # --omit=dev excludes dev-only packages (not shipped to Lambda).
        # --audit-level=high fails only on high/critical vulnerabilities.
        # continue-on-error: pre-existing vulns in some Lambdas should not block new PRs.
        # Security issues are tracked separately.
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

  # ---------------------------------------------------------------------------
  # Job 4: Build Validation
  #
  # Runs esbuild for each Node.js Lambda, verifies dist/index.js is produced,
  # and checks bundle size. Runs after tests pass.
  # ---------------------------------------------------------------------------
  build:
    name: Build Validation — ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, node-tests]

    if: |
      needs.detect-changes.outputs.shared == 'true'   ||
      needs.detect-changes.outputs.bedrock == 'true'  ||
      needs.detect-changes.outputs.meta_webhook == 'true' ||
      needs.detect-changes.outputs.meta_response == 'true' ||
      needs.detect-changes.outputs.calendar_watch_listener == 'true' ||
      needs.detect-changes.outputs.calendar_watch_onboarder == 'true' ||
      needs.detect-changes.outputs.calendar_watch_renewer == 'true' ||
      needs.detect-changes.outputs.calendar_watch_offboarder == 'true' ||
      needs.detect-changes.outputs.booking_commit_handler == 'true' ||
      needs.detect-changes.outputs.calendar_event_consumer == 'true' ||
      needs.detect-changes.outputs.stranded_booking_remediator == 'true' ||
      needs.detect-changes.outputs.calendar_lifecycle_consumer == 'true' ||
      needs.detect-changes.outputs.reminder_scheduler == 'true' ||
      needs.detect-changes.outputs.attendance_disposition_handler == 'true' ||
      needs.detect-changes.outputs.scheduling_redemption_handler == 'true' ||
      needs.detect-changes.outputs.scheduling_synthetic_monitor == 'true' ||
      needs.detect-changes.outputs.calendar_oauth_connect == 'true' ||
      needs.detect-changes.outputs.scheduling_page_api == 'true' ||
      needs.detect-changes.outputs.scheduled_message_sender == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - lambda: Bedrock_Streaming_Handler_Staging
            changed: ${{ needs.detect-changes.outputs.bedrock }}
          - lambda: Meta_Webhook_Handler
            changed: ${{ needs.detect-changes.outputs.meta_webhook }}
          - lambda: Meta_Response_Processor
            changed: ${{ needs.detect-changes.outputs.meta_response }}
          - lambda: Calendar_Watch_Listener
            changed: ${{ needs.detect-changes.outputs.calendar_watch_listener }}
          - lambda: Calendar_Watch_Onboarder
            changed: ${{ needs.detect-changes.outputs.calendar_watch_onboarder }}
          - lambda: Calendar_Watch_Renewer
            changed: ${{ needs.detect-changes.outputs.calendar_watch_renewer }}
          - lambda: Calendar_Watch_Offboarder
            changed: ${{ needs.detect-changes.outputs.calendar_watch_offboarder }}
          - lambda: Booking_Commit_Handler
            changed: ${{ needs.detect-changes.outputs.booking_commit_handler }}
          - lambda: Calendar_Event_Consumer
            changed: ${{ needs.detect-changes.outputs.calendar_event_consumer }}
          - lambda: Stranded_Booking_Remediator
            changed: ${{ needs.detect-changes.outputs.stranded_booking_remediator }}
          - lambda: Calendar_Lifecycle_Consumer
            changed: ${{ needs.detect-changes.outputs.calendar_lifecycle_consumer }}
          - lambda: Reminder_Scheduler
            changed: ${{ needs.detect-changes.outputs.reminder_scheduler }}
          - lambda: Attendance_Disposition_Handler
            changed: ${{ needs.detect-changes.outputs.attendance_disposition_handler }}
          - lambda: Scheduling_Redemption_Handler
            changed: ${{ needs.detect-changes.outputs.scheduling_redemption_handler }}
          - lambda: Scheduling_Synthetic_Monitor
            changed: ${{ needs.detect-changes.outputs.scheduling_synthetic_monitor }}
          - lambda: Calendar_OAuth_Connect
            changed: ${{ needs.detect-changes.outputs.calendar_oauth_connect }}
          - lambda: Scheduling_Page_Api
            changed: ${{ needs.detect-changes.outputs.scheduling_page_api }}
          - lambda: Scheduled_Message_Sender
            changed: ${{ needs.detect-changes.outputs.scheduled_message_sender }}

    steps:
      - name: Skip unchanged Lambda
        if: |
          matrix.changed != 'true' &&
          needs.detect-changes.outputs.shared != 'true'
        run: |
          echo "No changes in ${{ matrix.lambda }} or shared/ — skipping build."

      - name: Checkout
        if: |
          matrix.changed == 'true' ||
          needs.detect-changes.outputs.shared == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        if: |
          matrix.changed == 'true' ||
          needs.detect-changes.outputs.shared == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.lambda }}/package-lock.json

      - name: Install shared/scheduling deps (Booking_Commit_Handler + Stranded_Booking_Remediator + Calendar_Event_Consumer + Calendar_Lifecycle_Consumer + Attendance_Disposition_Handler + Scheduling_Redemption_Handler + Calendar_OAuth_Connect bundle them)
        if: |
          (matrix.lambda == 'Booking_Commit_Handler' || matrix.lambda == 'Stranded_Booking_Remediator' || matrix.lambda == 'Calendar_Event_Consumer' || matrix.lambda == 'Calendar_Lifecycle_Consumer' || matrix.lambda == 'Attendance_Disposition_Handler' || matrix.lambda == 'Scheduling_Redemption_Handler' || matrix.lambda == 'Calendar_OAuth_Connect' || matrix.lambda == 'Scheduling_Page_Api') &&
          (matrix.changed == 'true' || needs.detect-changes.outputs.shared == 'true')
        working-directory: shared/scheduling
        run: npm install

      - name: Install dependencies
        if: |
          matrix.changed == 'true' ||
          needs.detect-changes.outputs.shared == 'true'
        working-directory: ${{ matrix.lambda }}
        run: npm install

      - name: Run esbuild
        if: |
          matrix.changed == 'true' ||
          needs.detect-changes.outputs.shared == 'true'
        working-directory: ${{ matrix.lambda }}
        run: node esbuild.config.mjs

      - name: Verify dist bundle exists
        if: |
          matrix.changed == 'true' ||
          needs.detect-changes.outputs.shared == 'true'
        working-directory: ${{ matrix.lambda }}
        run: |
          # Most Lambdas emit dist/index.js (cjs); Scheduled_Message_Sender emits dist/index.mjs
          # (ESM source + package.json "type":"module"). Accept either.
          if [ ! -f dist/index.js ] && [ ! -f dist/index.mjs ]; then
            echo "ERROR: no dist/index.{js,mjs} produced by esbuild for ${{ matrix.lambda }}"
            exit 1
          fi
          echo "OK: dist bundle exists"

      - name: Check bundle size
        if: |
          matrix.changed == 'true' ||
          needs.detect-changes.outputs.shared == 'true'
        working-directory: ${{ matrix.lambda }}
        run: |
          BUNDLE_FILE=$([ -f dist/index.js ] && echo dist/index.js || echo dist/index.mjs)
          # macOS stat: -f%z | Linux stat: -c%s
          BUNDLE_BYTES=$(stat -c%z "$BUNDLE_FILE" 2>/dev/null || stat -f%z "$BUNDLE_FILE")
          BUNDLE_KB=$((BUNDLE_BYTES / 1024))
          BUNDLE_MB=$(echo "scale=2; $BUNDLE_BYTES / 1048576" | bc)

          echo "Bundle size: ${BUNDLE_KB}KB (${BUNDLE_MB}MB) — ${{ matrix.lambda }}/${BUNDLE_FILE}"

          # Warn threshold: 5MB (Lambda cold start degrades noticeably above this)
          WARN_BYTES=5242880
          # Hard fail threshold: 50MB (Lambda unzipped limit is 250MB; 50MB is a
          # reasonable guard for a single-file bundle)
          FAIL_BYTES=52428800

          if [ "$BUNDLE_BYTES" -gt "$FAIL_BYTES" ]; then
            echo "ERROR: Bundle exceeds 50MB hard limit. Review dependencies."
            exit 1
          fi

          if [ "$BUNDLE_BYTES" -gt "$WARN_BYTES" ]; then
            echo "WARNING: Bundle exceeds 5MB. Consider externalising more dependencies."
          fi

      - name: Upload build artifact
        if: |
          always() &&
          (matrix.changed == 'true' || needs.detect-changes.outputs.shared == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.lambda }}
          path: ${{ matrix.lambda }}/dist/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Job 5: Summary Gate
  #
  # Final job that requires all upstream jobs to succeed (or be skipped).
  # Branch protection rules should require this job — not the individual matrix
  # jobs — so the required check never disappears when a Lambda is skipped.
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Job 6: Chat-experience Tier-2 eval net (sub-phase 1.6)
  #
  # Runs the LIVE-Bedrock regression net (evals/run.js) whenever a file that
  # affects eval outcomes changes — the conversation prompt, the scheduling
  # narration prompt, or the eval harness/scenarios/baselines. `run.js` exits 1
  # on any regression / stale_baseline / live error, which fails this job (and
  # therefore all-checks-passed → the PR). The only sanctioned way to turn a
  # stale_baseline green is a PR-reviewed `node evals/run.js --update-baseline`.
  #
  # Creds: `environment: staging` scopes AWS_DEPLOY_ROLE_ARN to the STAGING (525)
  # GitHubActionsDeployRole — NOT the repo-level secret, which is the prod (614)
  # deploy role with no Bedrock access. The staging role has PowerUserAccess
  # (covers bedrock:InvokeModel), its trust policy allows the
  # `...:environment:staging` sub, staging acct 525 has Haiku 4.5 enabled in
  # us-east-1, and the staging environment has no protection rules / branch policy
  # (so PR runs aren't gated) — all verified 2026-07-04. This mirrors how
  # deploy-staging.yml reaches the staging account; the eval never touches prod.
  # A dedicated least-privilege eval role (bedrock:InvokeModel only) is a possible
  # future hardening.
  # ---------------------------------------------------------------------------
  chat-eval-net:
    name: Chat Eval Net — Bedrock_Streaming_Handler_Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    # Scopes AWS_DEPLOY_ROLE_ARN to the staging-account (525) role via the GitHub
    # Environment-scoped secret. Without this the job would get the repo-level
    # prod (614) role and fail (wrong account + no bedrock:InvokeModel).
    environment: staging
    # workflow_dispatch has no diff base, so paths-filter reports false — allow a
    # manual run to force the eval net regardless.
    if: |
      needs.detect-changes.outputs.eval_gate == 'true' ||
      github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write   # OIDC token to assume the AWS role
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Bedrock_Streaming_Handler_Staging/package-lock.json

      - name: Configure AWS credentials (staging OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install dependencies
        working-directory: Bedrock_Streaming_Handler_Staging
        run: npm install

      - name: Run Tier-2 eval net (live Bedrock — Haiku 4.5)
        working-directory: Bedrock_Streaming_Handler_Staging
        run: |
          set +e
          node evals/run.js --report eval-report.md
          code=$?
          if [ -f eval-report.md ]; then cat eval-report.md >> "$GITHUB_STEP_SUMMARY"; fi
          if [ "$code" -ne 0 ]; then
            echo "::error::Tier-2 eval net failed (regression / stale_baseline / live error). See the job summary."
          fi
          exit $code

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-eval-report
          path: Bedrock_Streaming_Handler_Staging/eval-report.md
          retention-days: 7
          if-no-files-found: ignore

  all-checks-passed:
    name: All Lambda Checks Passed
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [node-tests, applier-tests, python-tests, security, build, chat-eval-net]
    # Run even when upstream jobs were skipped (no changes detected).
    if: always()

    steps:
      - name: Check upstream results
        run: |
          echo "node-tests:     ${{ needs.node-tests.result }}"
          echo "applier-tests:  ${{ needs.applier-tests.result }}"
          echo "python-tests:   ${{ needs.python-tests.result }}"
          echo "security:       ${{ needs.security.result }}"
          echo "build:          ${{ needs.build.result }}"
          echo "chat-eval-net:  ${{ needs.chat-eval-net.result }}"

          # Acceptable terminal states: success or skipped.
          # Any failure or cancellation is a hard stop.
          for result in \
            "${{ needs.node-tests.result }}" \
            "${{ needs.applier-tests.result }}" \
            "${{ needs.python-tests.result }}" \
            "${{ needs.security.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.chat-eval-net.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "FAILED: one or more jobs did not pass (result: $result)"
              exit 1
            fi
          done

          echo "All Lambda checks passed."
