            # Validates one-click unsubscribe tokens and writes SUPPRESS#recap suppression
            # rows to picasso-attribution-aggregates. Single-purpose write-one-row endpoint.
            # boto3 from Lambda runtime; no requirements-layer.txt needed.
            # Function provisioned by Terraform in picasso#553; this entry deploys real code
            # over the placeholder. Env vars Terraform-managed (picasso infra/
            # lambda-attribution-unsubscribe-staging module).
            # NOTE: merge AFTER the Terraform PR (picasso#553) applies.
            staging_function: Attribution_Unsubscribe
            handler: lambda_function.lambda_handler
            runtime: python
            include_globs: 'lambda_function.py __init__.py'
            env_vars: ''
            smoke_path: ''
            smoke_expect_status: ''
            smoke_invoke_event: ''

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Pin the build-side Python to the Lambda runtime so any compiled
      # wheels we install (cryptography in particular) match the
      # interpreter at runtime.
      - name: Set up Python
        if: matrix.lambda.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        if: matrix.lambda.runtime == 'nodejs'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Package function (Python)
        if: matrix.lambda.runtime == 'python'
        id: package_python
        working-directory: ${{ matrix.lambda.source_dir }}
        run: |
          set -euo pipefail
          BUILD=/tmp/build
          rm -rf "$BUILD" && mkdir "$BUILD"
          # Source files first
          cp -r ${{ matrix.lambda.include_globs }} "$BUILD/"
          # Bundled deps (no Lambda Layer dependency — Phase 4.1
          # architectural choice). Each lambda dir owns its
          # requirements-layer.txt; if present, its contents land in
          # the zip alongside source.
          if [ -f requirements-layer.txt ]; then
            pip install --quiet --target "$BUILD" -r requirements-layer.txt
          fi
          cd "$BUILD"
          zip -q -r9 /tmp/deploy.zip .
          echo "size=$(stat -c%s /tmp/deploy.zip)" >> "$GITHUB_OUTPUT"
          echo "Packaged $(unzip -l /tmp/deploy.zip | tail -1)"

      - name: Zip-manifest guard (Python)
        if: matrix.lambda.runtime == 'python'
        run: |
          set -euo pipefail
          # The include_globs allowlist silently DROPS any runtime file that
          # isn't listed (cost §P5.1 twice —
          # reference_lambda_deploy_include_globs_allowlist). Fail loudly
          # instead: every tracked .py/.json in the source dir must be inside
          # the zip, except non-deployed classes: tests (test_*, run_*,
          # conftest) and one-off ops scripts (backfill_*, create_*,
          # migrate_*). New non-deployed file classes extend that exclusion
          # regex. unzip -Z1 = one filename per line (space-safe).
          # Mirrors the identical guard in deploy-production.yml.
          SRC='${{ matrix.lambda.source_dir }}'
          MISSING=0
          while IFS= read -r f; do
            rel="${f#"$SRC"/}"
            if ! unzip -Z1 /tmp/deploy.zip | grep -qx "$rel"; then
              echo "::error file=$f::Tracked runtime file missing from deploy zip — add it to include_globs (in BOTH deploy-staging.yml and deploy-production.yml)"
              MISSING=1
            fi
          done < <(git ls-files -- "$SRC/" | grep -E '\.(py|json)$' | grep -vE '(^|/)(test_|run_|conftest|backfill_|create_|migrate_)[^/]*\.(py|json)$')
          if [ "$MISSING" -eq 0 ]; then echo "Zip-manifest guard: all tracked runtime files present."; fi
          exit $MISSING

      # C8 (Booking_Commit_Handler) bundles ../shared/scheduling/* at esbuild
      # time. esbuild resolves those modules' own deps (@googleapis/calendar,
      # google-auth-library, @aws-sdk/*) from shared/scheduling/node_modules, so
      # install them before `npm run package` below. Mirrors the equivalent
      # pr-checks.yml step. Gated on the source_dir so no other Lambda pays it.
      - name: Install shared/scheduling deps (Booking_Commit_Handler bundles them)
        if: matrix.lambda.source_dir == 'Booking_Commit_Handler'
        working-directory: shared/scheduling
        run: npm install

      - name: Package function (Node.js)
        if: matrix.lambda.runtime == 'nodejs'
        id: package_nodejs
        working-directory: ${{ matrix.lambda.source_dir }}
        run: |
          set -euo pipefail
          # Per-Lambda `package.json` controls what `npm run package` actually
          # does. Two patterns observed in this repo:
          #   - BSH: esbuild bundle → zip -j deployment.zip dist/index.js (single
          #     file). Needs devDependencies (esbuild) → `npm ci` (not --production).
          #   - SMS_Sender + SMS_Webhook_Handler: `npm ci --production && zip -r
          #     deployment.zip .` (vendored node_modules in the zip). The script
          #     re-runs `npm ci --production` itself, pruning the dev install.
          # Either way, `npm ci` here is a no-op-ish pre-step; `npm run package`
          # is the authoritative bundle.
          npm ci
          npm run package
          cp deployment.zip /tmp/deploy.zip
          echo "size=$(stat -c%s /tmp/deploy.zip)" >> "$GITHUB_OUTPUT"
          echo "Packaged $(unzip -l /tmp/deploy.zip | tail -1)"

      - name: Update function configuration (env vars)
        if: matrix.lambda.env_vars != ''
        env:
          MATRIX_ENV_VARS: ${{ matrix.lambda.env_vars }}
          FN_NAME: ${{ matrix.lambda.staging_function }}
        run: |
          set -euo pipefail
          # MERGE matrix env_vars with existing live env vars. Matrix entries
          # take precedence on key conflicts; existing out-of-band vars are
          # preserved. Fix for fourth-audit row #8: previous version REPLACED
          # the entire Variables map, which wiped any var not enumerated here.
          # Limitation: matrix value cannot contain commas (need JSON-file
          # approach for that).

          # 1. Snapshot current env vars (null-safe: empty if none set)
          aws lambda get-function-configuration \
            --function-name "$FN_NAME" \
            --query 'Environment.Variables' --output json > /tmp/current_env.json
          if [ "$(cat /tmp/current_env.json)" = "null" ]; then
            echo '{}' > /tmp/current_env.json
          fi

          # 2. Convert matrix KEY=val,KEY=val into JSON via python (jq -R . is
          #    surprisingly awkward for this; python is clearer)
          python3 - <<'PY'
          import json, os
          raw = os.environ['MATRIX_ENV_VARS']
          pairs = {}
          for kv in raw.split(','):
              if not kv:
                  continue
              k, _, v = kv.partition('=')
              pairs[k.strip()] = v.strip()
          with open('/tmp/matrix_env.json', 'w') as f:
              json.dump(pairs, f)
          PY

          # 3. Merge (matrix wins on conflict)
          jq -s '.[0] * .[1] | {Variables: .}' /tmp/current_env.json /tmp/matrix_env.json > /tmp/env.json
          echo "Merged env vars (keys):"
          jq -r '.Variables | keys[]' /tmp/env.json | sort
          echo "---"

          # 4. Apply
          aws lambda update-function-configuration \
            --function-name "$FN_NAME" \
            --environment file:///tmp/env.json \
            --query '{State:State,LastUpdateStatus:LastUpdateStatus}'
          aws lambda wait function-updated \
            --function-name "$FN_NAME"

      - name: Update function code
        id: update
        run: |
          set -euo pipefail
          aws lambda update-function-code \
            --function-name ${{ matrix.lambda.staging_function }} \
            --zip-file fileb:///tmp/deploy.zip \
            --no-publish \
            --query '{State:State, LastUpdateStatus:LastUpdateStatus}'
          aws lambda wait function-updated \
            --function-name ${{ matrix.lambda.staging_function }}

      - name: Smoke test (HTTP)
        if: matrix.lambda.smoke_path != ''
        env:
          # Per-matrix override. When set, the smoke routes via this base URL
          # (typically CloudFront) instead of the Lambda Function URL. Required
          # for any Lambda gated by REQUIRE_CF_ORIGIN_HEADER (activated for
          # MFS 2026-05-13); direct Function URL hits now 403.
          SMOKE_BASE_URL: '${{ matrix.lambda.smoke_base_url }}'
        run: |
          set -euo pipefail
          if [ -n "$SMOKE_BASE_URL" ]; then
            URL="$SMOKE_BASE_URL"
          else
            # Deterministic: filter for the unaliased ($LATEST) URL config.
            # Aliased entries have a Qualifier field; the $LATEST entry does not.
            # Tolerates transitional state where alias URLs still exist.
            URL=$(aws lambda list-function-url-configs \
              --function-name ${{ matrix.lambda.staging_function }} \
              --query 'FunctionUrlConfigs[?!Qualifier].FunctionUrl | [0]' --output text)
          fi
          # Retry: immediately after update-function-code the Function URL
          # transiently 403s (or 5xx) while the new code + URL auth plane
          # propagate. `aws lambda wait function-updated` covers the CODE
          # plane only — for AuthType=AWS_IAM RESPONSE_STREAM URLs the AUTH
          # plane lags MORE THAN 30s (run 27258497374, 2026-06-10: BSH smoke
          # 403'd for all 5×6s attempts starting 7s after the update, twice;
          # the same URL served 200 to independent clients throughout and
          # settled well within 5 minutes). Budget: 15×12s = 3 minutes.
          # Pre-2.5 this never fired because the CF-routed smoke hit the OLD
          # origin, which the run had not just updated.
          FULL_URL="${URL%/}${{ matrix.lambda.smoke_path }}"
          EXPECT="${{ matrix.lambda.smoke_expect_status }}"
          STATUS=""
          for attempt in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$FULL_URL")
            echo "Smoke attempt $attempt: GET $FULL_URL → $STATUS (expect $EXPECT)"
            [ "$STATUS" = "$EXPECT" ] && break
            sleep 12
          done
          if [ "$STATUS" != "$EXPECT" ]; then
            echo "::error::Expected $EXPECT, got $STATUS after 15 attempts (3m)"
            exit 1
          fi

      - name: Smoke test (invoke)
        if: matrix.lambda.smoke_invoke_event != ''
        # Single-quote the GHA expression so the substituted JSON (with double
        # quotes) survives bash parsing. Double-quoting would break on the
        # JSON's own double quotes.
        env:
          SMOKE_PAYLOAD: '${{ matrix.lambda.smoke_invoke_event }}'
          FN_NAME: '${{ matrix.lambda.staging_function }}'
        run: |
          set -euo pipefail
          # For stream-triggered Lambdas (no Function URL): RequestResponse
          # invoke with a no-op event. Proves cold-start succeeds + handler
          # reaches its return. We do NOT assert on the response payload
          # shape — that's the unit-test surface — only that the invoke
          # itself succeeded (StatusCode 200, no FunctionError).
          RESP_FILE=$(mktemp)
          INVOKE_OUT=$(aws lambda invoke \
            --function-name "$FN_NAME" \
            --cli-binary-format raw-in-base64-out \
            --payload "$SMOKE_PAYLOAD" \
            --query '{Status:StatusCode, FunctionError:FunctionError}' \
            "$RESP_FILE")
          echo "Smoke invoke: $INVOKE_OUT"
          echo "Response: $(cat "$RESP_FILE")"
          STATUS=$(echo "$INVOKE_OUT" | python3 -c "import json,sys; print(json.load(sys.stdin)['Status'])")
          FN_ERROR=$(echo "$INVOKE_OUT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('FunctionError') or '')")
          if [ "$STATUS" != "200" ] || [ -n "$FN_ERROR" ]; then
            echo "::error::Invoke smoke failed: Status=$STATUS FunctionError=$FN_ERROR"
            exit 1
          fi

      - name: Summary
        run: |
          COMMIT_SHA=${{ github.sha }}
          echo "### Deployed ${{ matrix.lambda.staging_function }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Code:** \$LATEST (commit ${COMMIT_SHA:0:7})" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Smoke:** passed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Rollback: re-run this workflow on a previous commit (\`gh workflow run deploy-staging.yml\` from a reverted branch)" >> "$GITHUB_STEP_SUMMARY"
