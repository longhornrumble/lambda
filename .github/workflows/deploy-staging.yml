name: Deploy Lambda — Staging

# Auto-deploy each touched Lambda's code to its `*_Staging` counterpart on
# merge to main. Code goes to $LATEST. No version publish, no aliases — staging
# uses AWS-native versioning only (rollback = redeploy previous commit).
#
# See feedback_uniform_env_rules.md: per-environment conventions apply uniformly.
# Staging is $LATEST-only.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      lambda:
        description: Lambda name to deploy (matches matrix include)
        type: choice
        required: true
        options:
          - Analytics_Dashboard_API
          - picasso-session-archiver
          - Master_Function_Staging

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: '3.13'

jobs:
  detect-changes:
    name: Detect changed Lambdas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      analytics_dashboard_api: ${{ steps.filter.outputs.analytics_dashboard_api }}
      picasso_session_archiver: ${{ steps.filter.outputs.picasso_session_archiver }}
      master_function_staging: ${{ steps.filter.outputs.master_function_staging }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            analytics_dashboard_api:
              - 'Analytics_Dashboard_API/**'
            picasso_session_archiver:
              - 'picasso_session_archiver/**'
            master_function_staging:
              - 'Master_Function_Staging/**'

  deploy:
    name: Deploy ${{ matrix.lambda.staging_function }}
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # GitHub Environment scopes AWS_DEPLOY_ROLE_ARN to the staging-account role
    # (525409062831:role/GitHubActionsDeployRole). The role's trust policy
    # requires sub `repo:longhornrumble/*:environment:staging`, so this
    # assignment is what unlocks OIDC into the staging account from a `main`
    # push. See project memory: project_aws_native_versioning_staging_twin.
    environment: staging
    permissions:
      id-token: write
      contents: read
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.analytics_dashboard_api == 'true' ||
      needs.detect-changes.outputs.picasso_session_archiver == 'true' ||
      needs.detect-changes.outputs.master_function_staging == 'true'
    strategy:
      fail-fast: false
      matrix:
        lambda:
          - source_dir: Analytics_Dashboard_API
            # No `_Staging` suffix per uniform-env-rules in the staging account
            # (525409062831). Account boundary IS the env separation. The
            # legacy prod-account `Analytics_Dashboard_API_Staging` Lambda was
            # decommissioned 2026-05-10 (Phase 4.5).
            staging_function: Analytics_Dashboard_API
            handler: lambda_function.lambda_handler
            # Files included in the deployment zip (anything not listed is excluded).
            # Keep this surgical — exclude tests, migration scripts, build helpers.
            include_globs: 'lambda_function.py tenant_registry_ops.py'
            # env_vars are managed out-of-band for this Lambda today. The step
            # below MERGES matrix env_vars with existing live env vars (matrix
            # wins on conflict) so populating this list adds/overrides without
            # wiping out-of-band vars. Safe to extend incrementally.
            env_vars: ''
            # Smoke via Function URL HTTP probe; auth-gated endpoints return 401.
            smoke_path: /forms/summary
            smoke_expect_status: '401'
            # Invoke-based smoke is for Lambdas without a Function URL (e.g.
            # stream-triggered). Leave empty when smoke_path is set.
            smoke_invoke_event: ''
          - source_dir: picasso_session_archiver
            # Kebab-case Lambda name; underscore source dir name. Lambda is
            # invoked by DDB Streams ESM (no Function URL).
            staging_function: picasso-session-archiver
            handler: lambda_function.lambda_handler
            include_globs: 'lambda_function.py'
            # CI is the source of truth for the keys listed here. The step
            # MERGES with existing live env vars (matrix wins on conflict).
            # Other vars set out-of-band are preserved. Values with embedded
            # commas need the JSON-file approach (not yet implemented).
            env_vars: 'ARCHIVE_BUCKET=picasso-archive-staging'
            smoke_path: ''
            smoke_expect_status: ''
            # Empty Records list exercises cold-start + handler entry with no
            # archive side effects. Expected response: archived=0, no failures.
            smoke_invoke_event: '{"Records":[]}'
          - source_dir: Master_Function_Staging
            # In staging account, Lambda keeps its `_Staging` suffix because
            # the matching prod-account Lambda is `Master_Function` (no
            # suffix). Different account boundary IS the env separation,
            # but the function NAMES remain distinct because the prod-side
            # name was claimed first historically. Cf. ADA, where staging
            # and prod both renamed to the suffix-less form on Phase 4.5.
            staging_function: Master_Function_Staging
            handler: lambda_function.lambda_handler
            # MFS historically bundled its entire source dir (76 git-tracked
            # files: 27 runtime .py + jwt/ + PyJWT-2.10.1.dist-info/ +
            # config JSON). A surgical include list would be 30+ entries
            # for trivial size savings. Match legacy "zip everything" via
            # `*` glob; CI checkout excludes pyc/__pycache__/build artifacts
            # via .gitignore.
            include_globs: '*'
            # MFS env vars are managed out-of-band (S3 buckets, DDB tables,
            # JWT key name, Bedrock config). Adding any here would merge,
            # not replace, but the CI-source-of-truth call is a Phase 4.5
            # decision — not within scope of bringing MFS to CI deploys.
            env_vars: ''
            # action=health_check returns 200 unauthenticated; default route
            # (no action) also dispatches to health_check. Use the explicit
            # form for clarity in CI logs.
            smoke_path: '/?action=health_check'
            smoke_expect_status: '200'
            smoke_invoke_event: ''

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Pin the build-side Python to the Lambda runtime so any compiled
      # wheels we install (cryptography in particular) match the
      # interpreter at runtime.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Package function
        id: package
        working-directory: ${{ matrix.lambda.source_dir }}
        run: |
          set -euo pipefail
          BUILD=/tmp/build
          rm -rf "$BUILD" && mkdir "$BUILD"
          # Source files first
          cp -r ${{ matrix.lambda.include_globs }} "$BUILD/"
          # Bundled deps (no Lambda Layer dependency — Phase 4.1
          # architectural choice). Each lambda dir owns its
          # requirements-layer.txt; if present, its contents land in
          # the zip alongside source.
          if [ -f requirements-layer.txt ]; then
            pip install --quiet --target "$BUILD" -r requirements-layer.txt
          fi
          cd "$BUILD"
          zip -q -r9 /tmp/deploy.zip .
          echo "size=$(stat -c%s /tmp/deploy.zip)" >> "$GITHUB_OUTPUT"
          echo "Packaged $(unzip -l /tmp/deploy.zip | tail -1)"

      - name: Update function configuration (env vars)
        if: matrix.lambda.env_vars != ''
        env:
          MATRIX_ENV_VARS: ${{ matrix.lambda.env_vars }}
          FN_NAME: ${{ matrix.lambda.staging_function }}
        run: |
          set -euo pipefail
          # MERGE matrix env_vars with existing live env vars. Matrix entries
          # take precedence on key conflicts; existing out-of-band vars are
          # preserved. Fix for fourth-audit row #8: previous version REPLACED
          # the entire Variables map, which wiped any var not enumerated here.
          # Limitation: matrix value cannot contain commas (need JSON-file
          # approach for that).

          # 1. Snapshot current env vars (null-safe: empty if none set)
          aws lambda get-function-configuration \
            --function-name "$FN_NAME" \
            --query 'Environment.Variables' --output json > /tmp/current_env.json
          if [ "$(cat /tmp/current_env.json)" = "null" ]; then
            echo '{}' > /tmp/current_env.json
          fi

          # 2. Convert matrix KEY=val,KEY=val into JSON via python (jq -R . is
          #    surprisingly awkward for this; python is clearer)
          python3 - <<'PY'
          import json, os
          raw = os.environ['MATRIX_ENV_VARS']
          pairs = {}
          for kv in raw.split(','):
              if not kv:
                  continue
              k, _, v = kv.partition('=')
              pairs[k.strip()] = v.strip()
          with open('/tmp/matrix_env.json', 'w') as f:
              json.dump(pairs, f)
          PY

          # 3. Merge (matrix wins on conflict)
          jq -s '.[0] * .[1] | {Variables: .}' /tmp/current_env.json /tmp/matrix_env.json > /tmp/env.json
          echo "Merged env vars (keys):"
          jq -r '.Variables | keys[]' /tmp/env.json | sort
          echo "---"

          # 4. Apply
          aws lambda update-function-configuration \
            --function-name "$FN_NAME" \
            --environment file:///tmp/env.json \
            --query '{State:State,LastUpdateStatus:LastUpdateStatus}'
          aws lambda wait function-updated \
            --function-name "$FN_NAME"

      - name: Update function code
        id: update
        run: |
          set -euo pipefail
          aws lambda update-function-code \
            --function-name ${{ matrix.lambda.staging_function }} \
            --zip-file fileb:///tmp/deploy.zip \
            --no-publish \
            --query '{State:State, LastUpdateStatus:LastUpdateStatus}'
          aws lambda wait function-updated \
            --function-name ${{ matrix.lambda.staging_function }}

      - name: Smoke test (HTTP)
        if: matrix.lambda.smoke_path != ''
        run: |
          set -euo pipefail
          # Deterministic: filter for the unaliased ($LATEST) URL config.
          # Aliased entries have a Qualifier field; the $LATEST entry does not.
          # Tolerates transitional state where alias URLs still exist.
          URL=$(aws lambda list-function-url-configs \
            --function-name ${{ matrix.lambda.staging_function }} \
            --query 'FunctionUrlConfigs[?!Qualifier].FunctionUrl | [0]' --output text)
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${URL%/}${{ matrix.lambda.smoke_path }}")
          echo "Smoke: GET ${URL%/}${{ matrix.lambda.smoke_path }} → $STATUS"
          if [ "$STATUS" != "${{ matrix.lambda.smoke_expect_status }}" ]; then
            echo "::error::Expected ${{ matrix.lambda.smoke_expect_status }}, got $STATUS"
            exit 1
          fi

      - name: Smoke test (invoke)
        if: matrix.lambda.smoke_invoke_event != ''
        # Single-quote the GHA expression so the substituted JSON (with double
        # quotes) survives bash parsing. Double-quoting would break on the
        # JSON's own double quotes.
        env:
          SMOKE_PAYLOAD: '${{ matrix.lambda.smoke_invoke_event }}'
          FN_NAME: '${{ matrix.lambda.staging_function }}'
        run: |
          set -euo pipefail
          # For stream-triggered Lambdas (no Function URL): RequestResponse
          # invoke with a no-op event. Proves cold-start succeeds + handler
          # reaches its return. We do NOT assert on the response payload
          # shape — that's the unit-test surface — only that the invoke
          # itself succeeded (StatusCode 200, no FunctionError).
          RESP_FILE=$(mktemp)
          INVOKE_OUT=$(aws lambda invoke \
            --function-name "$FN_NAME" \
            --cli-binary-format raw-in-base64-out \
            --payload "$SMOKE_PAYLOAD" \
            --query '{Status:StatusCode, FunctionError:FunctionError}' \
            "$RESP_FILE")
          echo "Smoke invoke: $INVOKE_OUT"
          echo "Response: $(cat "$RESP_FILE")"
          STATUS=$(echo "$INVOKE_OUT" | python3 -c "import json,sys; print(json.load(sys.stdin)['Status'])")
          FN_ERROR=$(echo "$INVOKE_OUT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('FunctionError') or '')")
          if [ "$STATUS" != "200" ] || [ -n "$FN_ERROR" ]; then
            echo "::error::Invoke smoke failed: Status=$STATUS FunctionError=$FN_ERROR"
            exit 1
          fi

      - name: Summary
        run: |
          COMMIT_SHA=${{ github.sha }}
          echo "### Deployed ${{ matrix.lambda.staging_function }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Code:** \$LATEST (commit ${COMMIT_SHA:0:7})" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Smoke:** passed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Rollback: re-run this workflow on a previous commit (\`gh workflow run deploy-staging.yml\` from a reverted branch)" >> "$GITHUB_STEP_SUMMARY"
