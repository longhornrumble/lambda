name: Deploy Lambda — Staging

# Auto-deploy each touched Lambda's code to its `*_Staging` counterpart on
# merge to main. Code goes to $LATEST. No version publish, no aliases — staging
# uses AWS-native versioning only (rollback = redeploy previous commit).
#
# See feedback_uniform_env_rules.md: per-environment conventions apply uniformly.
# Staging is $LATEST-only.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      lambda:
        description: Lambda name to deploy (matches matrix include)
        type: choice
        required: true
        options:
          - Analytics_Dashboard_API
          - Analytics_Event_Processor
          - picasso-session-archiver
          - Master_Function
          - Bedrock_Streaming_Handler
          - SMS_Sender
          - SMS_Webhook_Handler
          - Meta_Webhook_Handler
          - Meta_Response_Processor
          - Meta_OAuth_Handler
          - Calendar_Watch_Listener
          - Calendar_Watch_Onboarder
          - Calendar_Watch_Renewer
          - Calendar_Watch_Offboarder
          - Booking_Commit_Handler
          - Scheduling_Redemption_Handler
          - Scheduling_Page_Api
          - Calendar_Event_Consumer
          - Calendar_Lifecycle_Consumer
          - Calendar_OAuth_Connect
          - Reminder_Scheduler
          - Scheduled_Message_Sender
          - Scheduling_Synthetic_Monitor
          - Attendance_Disposition_Handler
          - Attribution_Mint_Service
          - Attribution_Aggregator
          - Attribution_Recap_Generator
          - Attribution_Unsubscribe

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '20.x'   # Match the Lambda nodejs20.x runtime (phase-audit row GM; was 22.x — pr-checks already builds/tests on 20)

jobs:
  detect-changes:
    name: Detect changed Lambdas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      analytics_dashboard_api: ${{ steps.filter.outputs.analytics_dashboard_api }}
      analytics_event_processor: ${{ steps.filter.outputs.analytics_event_processor }}
      picasso_session_archiver: ${{ steps.filter.outputs.picasso_session_archiver }}
      master_function_staging: ${{ steps.filter.outputs.master_function_staging }}
      bedrock_streaming_handler_staging: ${{ steps.filter.outputs.bedrock_streaming_handler_staging }}
      sms_sender: ${{ steps.filter.outputs.sms_sender }}
      sms_webhook_handler: ${{ steps.filter.outputs.sms_webhook_handler }}
      meta_webhook_handler: ${{ steps.filter.outputs.meta_webhook_handler }}
      meta_response_processor: ${{ steps.filter.outputs.meta_response_processor }}
      meta_oauth_handler: ${{ steps.filter.outputs.meta_oauth_handler }}
      calendar_watch_listener: ${{ steps.filter.outputs.calendar_watch_listener }}
      calendar_watch_onboarder: ${{ steps.filter.outputs.calendar_watch_onboarder }}
      calendar_watch_renewer: ${{ steps.filter.outputs.calendar_watch_renewer }}
      calendar_watch_offboarder: ${{ steps.filter.outputs.calendar_watch_offboarder }}
      booking_commit_handler: ${{ steps.filter.outputs.booking_commit_handler }}
      scheduling_page_api: ${{ steps.filter.outputs.scheduling_page_api }}
      calendar_oauth_connect: ${{ steps.filter.outputs.calendar_oauth_connect }}
      reminder_scheduler: ${{ steps.filter.outputs.reminder_scheduler }}
      scheduled_message_sender: ${{ steps.filter.outputs.scheduled_message_sender }}
      attribution_mint_service:      ${{ steps.filter.outputs.attribution_mint_service }}
      attribution_aggregator:        ${{ steps.filter.outputs.attribution_aggregator }}
      attribution_recap_generator:   ${{ steps.filter.outputs.attribution_recap_generator }}
      attribution_unsubscribe:       ${{ steps.filter.outputs.attribution_unsubscribe }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            analytics_dashboard_api:
              - 'Analytics_Dashboard_API/**'
            analytics_event_processor:
              - 'Analytics_Event_Processor/**'
            picasso_session_archiver:
              - 'picasso_session_archiver/**'
            master_function_staging:
              - 'Master_Function_Staging/**'
            bedrock_streaming_handler_staging:
              - 'Bedrock_Streaming_Handler_Staging/**'
            sms_sender:
              - 'SMS_Sender/**'
            sms_webhook_handler:
              - 'SMS_Webhook_Handler/**'
            meta_webhook_handler:
              - 'Meta_Webhook_Handler/**'
            meta_response_processor:
              - 'Meta_Response_Processor/**'
            meta_oauth_handler:
              - 'Meta_OAuth_Handler/**'
            calendar_watch_listener:
              - 'Calendar_Watch_Listener/**'
            calendar_watch_onboarder:
              - 'Calendar_Watch_Onboarder/**'
            calendar_watch_renewer:
              - 'Calendar_Watch_Renewer/**'
            calendar_watch_offboarder:
              - 'Calendar_Watch_Offboarder/**'
            booking_commit_handler:
              # C8 commit keystone. Dir-only, matching the sibling calendar
              # Lambdas' deploy filters. NOTE: C8 is the first Lambda that
              # *bundles* shared/scheduling/* at esbuild time, so a
              # shared/scheduling change WITHOUT a Booking_Commit_Handler/**
              # change will NOT auto-redeploy a fresh bundle — redeploy manually
              # after such a change:
              #   gh workflow run "Deploy Lambda — Staging" -f lambda=Booking_Commit_Handler
              - 'Booking_Commit_Handler/**'
            scheduling_page_api:
              # Scheduling PAGE M1 gateway. Dir-only — like C8/redemption it *bundles*
              # shared/scheduling/sessionBinding.js, so a shared/scheduling-only change
              # WITHOUT a Scheduling_Page_Api/** change won't auto-rebundle; redeploy manually:
              #   gh workflow run "Deploy Lambda — Staging" -f lambda=Scheduling_Page_Api
              - 'Scheduling_Page_Api/**'
            calendar_oauth_connect:
              # E11 per-staff Google consent Lambda (G3). Dir-only — like C8/redemption it
              # *bundles* shared/scheduling/featureGate.js, so a shared/scheduling-only change
              # WITHOUT a Calendar_OAuth_Connect/** change won't auto-rebundle; redeploy manually:
              #   gh workflow run "Deploy Lambda — Staging" -f lambda=Calendar_OAuth_Connect
              - 'Calendar_OAuth_Connect/**'
            reminder_scheduler:
              # Track 1 S6 — the nightly reconciler. Self-contained (scheduler.js + cadence.js,
              # no shared/scheduling import), so dir-only is complete.
              - 'Reminder_Scheduler/**'
            scheduled_message_sender:
              # Track 1 S6 — the EventBridge schedule target. Like C8/redemption it *bundles*
              # shared/scheduling/channels.js, so a shared/scheduling-only change WITHOUT a
              # Scheduled_Message_Sender/** change won't auto-rebundle; redeploy manually:
              #   gh workflow run "Deploy Lambda — Staging" -f lambda=Scheduled_Message_Sender
              - 'Scheduled_Message_Sender/**'
            attribution_mint_service:
              - 'Attribution_Mint_Service/**'
            attribution_aggregator:
              - 'Attribution_Aggregator/**'
            attribution_recap_generator:
              - 'Attribution_Recap_Generator/**'
            attribution_unsubscribe:
              - 'Attribution_Unsubscribe/**'

  deploy:
    name: Deploy ${{ matrix.lambda.staging_function }}
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # GitHub Environment scopes AWS_DEPLOY_ROLE_ARN to the staging-account role
    # (525409062831:role/GitHubActionsDeployRole). The role's trust policy
    # requires sub `repo:longhornrumble/*:environment:staging`, so this
    # assignment is what unlocks OIDC into the staging account from a `main`
    # push. See project memory: project_aws_native_versioning_staging_twin.
    environment: staging
    permissions:
      id-token: write
      contents: read
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.analytics_dashboard_api == 'true' ||
      needs.detect-changes.outputs.analytics_event_processor == 'true' ||
      needs.detect-changes.outputs.picasso_session_archiver == 'true' ||
      needs.detect-changes.outputs.master_function_staging == 'true' ||
      needs.detect-changes.outputs.bedrock_streaming_handler_staging == 'true' ||
      needs.detect-changes.outputs.sms_sender == 'true' ||
      needs.detect-changes.outputs.sms_webhook_handler == 'true' ||
      needs.detect-changes.outputs.meta_webhook_handler == 'true' ||
      needs.detect-changes.outputs.meta_response_processor == 'true' ||
      needs.detect-changes.outputs.meta_oauth_handler == 'true' ||
      needs.detect-changes.outputs.calendar_watch_listener == 'true' ||
      needs.detect-changes.outputs.calendar_watch_onboarder == 'true' ||
      needs.detect-changes.outputs.calendar_watch_renewer == 'true' ||
      needs.detect-changes.outputs.calendar_watch_offboarder == 'true' ||
      needs.detect-changes.outputs.booking_commit_handler == 'true' ||
      needs.detect-changes.outputs.scheduling_page_api == 'true' ||
      needs.detect-changes.outputs.calendar_oauth_connect == 'true' ||
      needs.detect-changes.outputs.reminder_scheduler == 'true' ||
      needs.detect-changes.outputs.scheduled_message_sender == 'true' ||
      needs.detect-changes.outputs.attribution_mint_service == 'true' ||
      needs.detect-changes.outputs.attribution_aggregator == 'true' ||
      needs.detect-changes.outputs.attribution_recap_generator == 'true' ||
      needs.detect-changes.outputs.attribution_unsubscribe == 'true'
    strategy:
      fail-fast: false
      matrix:
        lambda:
          - source_dir: Analytics_Dashboard_API
            # No `_Staging` suffix per uniform-env-rules in the staging account
            # (525409062831). Account boundary IS the env separation. The
            # legacy prod-account `Analytics_Dashboard_API_Staging` Lambda was
            # decommissioned 2026-05-10 (Phase 4.5).
            staging_function: Analytics_Dashboard_API
            handler: lambda_function.lambda_handler
            runtime: python
            # Files included in the deployment zip (anything not listed is excluded).
            # Keep this surgical — exclude tests, migration scripts, build helpers.
            include_globs: 'lambda_function.py tenant_registry_ops.py attribution_api.py attribution_rules.py'
            # env_vars are managed out-of-band for this Lambda today. The step
            # below MERGES matrix env_vars with existing live env vars (matrix
            # wins on conflict) so populating this list adds/overrides without
            # wiping out-of-band vars. Safe to extend incrementally.
            env_vars: ''
            # Smoke via Function URL HTTP probe; auth-gated endpoints return 401.
            smoke_path: /forms/summary
            smoke_expect_status: '401'
            # Invoke-based smoke is for Lambdas without a Function URL (e.g.
            # stream-triggered). Leave empty when smoke_path is set.
            smoke_invoke_event: ''
          - source_dir: picasso_session_archiver
            # Kebab-case Lambda name; underscore source dir name. Lambda is
            # invoked by DDB Streams ESM (no Function URL).
            staging_function: picasso-session-archiver
            handler: lambda_function.lambda_handler
            runtime: python
            include_globs: 'lambda_function.py'
            # CI is the source of truth for the keys listed here. The step
            # MERGES with existing live env vars (matrix wins on conflict).
            # Other vars set out-of-band are preserved. Values with embedded
            # commas need the JSON-file approach (not yet implemented).
            env_vars: 'ARCHIVE_BUCKET=picasso-archive-staging'
            smoke_path: ''
            smoke_expect_status: ''
            # Empty Records list exercises cold-start + handler entry with no
            # archive side effects. Expected response: archived=0, no failures.
            smoke_invoke_event: '{"Records":[]}'
          - source_dir: Analytics_Event_Processor
            # BSH staging-twin Phase C: SQS-triggered Lambda that consumes
            # browser analytics events and writes to S3 + DDB session-events.
            # No `_Staging` suffix per uniform-env-rules in the staging account
            # (525409062831) — account boundary is env separation. Prod-side
            # equivalent is `Picasso_Analytics_Event_Processor` (different name
            # for historical reasons; do not align).
            staging_function: Analytics_Event_Processor
            handler: lambda_function.lambda_handler
            runtime: python
            # Stdlib + boto3 only; boto3 is bundled in the Lambda runtime, so
            # no third-party deps to ship. Single runtime file.
            include_globs: 'lambda_function.py'
            # Env vars managed by the Phase C Terraform module
            # (analytics-events-pipeline-staging). Matrix-side env_vars empty
            # keeps Terraform as single source of truth; matches the
            # Analytics_Dashboard_API entry above.
            env_vars: ''
            smoke_path: ''
            smoke_expect_status: ''
            # Empty Records list exercises cold-start + handler entry with no
            # SQS-message side effects. Matches the picasso_session_archiver
            # pattern above.
            smoke_invoke_event: '{"Records":[]}'
          - source_dir: Master_Function_Staging
            # CI-modernization task 2.5 (picasso TASK_2_5_DESUFFIX_SCOPE.md):
            # staging function de-suffixed to the bare name — account boundary
            # IS the env separation, matching ADA/SMS_Sender/Calendar_*. The
            # SOURCE DIR keeps its historical name (operator decision #1:
            # repo paths are not env resources; this mapping line is the
            # seam). The old `Master_Function_Staging` function was
            # decommissioned in 2.5 Wave 4 (picasso#516, 2026-06-11).
            staging_function: Master_Function
            handler: lambda_function.lambda_handler
            runtime: python
            # Explicit runtime-file enumeration. Previously `'*'` shipped
            # ~528KB of non-runtime cruft (13 test_*.py + 2 run_*.py + 5
            # *.md docs + pytest.ini + a tracked binary build artifact
            # `ziAk9MVK`) to every Lambda deploy. Phase 3 audit row #9
            # required surgery. Listing 27 source .py + jwt + PyJWT
            # dist-info + 2 config JSON keeps runtime behavior identical
            # while excluding tests/docs/binary cruft. Future-add risk:
            # new runtime .py needs to be added here too — that's the
            # cost of surgical includes (same property as ADA's matrix
            # entry).
            include_globs: >-
              analytics_writer.py
              audit_logger.py
              aws_client_manager.py
              bedrock_handler_optimized.py
              contact_extractor.py
              conversation_handler.py
              form_cta_enhancer.py
              form_handler.py
              intent_router.py
              lambda_function.py
              pii_subject.py
              redact_pii.py
              response_formatter.py
              session_utils.py
              template_renderer.py
              tenant_config_loader.py
              tenant_inference.py
              tenant_registry.py
              token_blacklist.py
              jwt
              PyJWT-2.10.1.dist-info
              notification_templates.json
              analytics_writer_contract.json
            # Most MFS env vars stay out-of-band today; the merge-not-replace
            # step at line ~156 preserves them. CI manages the keys listed
            # below per Phase 4. Both are fail-loud reads in code (KeyError
            # if missing on the function):
            #   - BEDROCK_MODEL_ID: Bedrock default model (EC-P4-2)
            #   - STREAMING_ENDPOINT: BSH Function URL for handle_stream_token
            #     (EC-P4-4). Was previously out-of-band with a hardcoded
            #     prod-account URL fallback. Phase 4 audit row #4 flagged the
            #     out-of-band gap; this brings it under CI source-of-truth.
            # STREAMING_ENDPOINT = the bare BSH instance's Function URL (the
            # new pair streams together; Terraform sets the same value via
            # module output — keep them identical or applies/deploys flap).
            env_vars: 'BEDROCK_MODEL_ID=global.anthropic.claude-haiku-4-5-20251001-v1:0,STREAMING_ENDPOINT=https://av5b2veoxmmrmx3hmggjell4bu0igeru.lambda-url.us-east-1.on.aws/'
            # action=health_check returns 200 unauthenticated; default route
            # (no action) also dispatches to health_check. Use the explicit
            # form for clarity in CI logs.
            #
            # CF origin header activation 2026-05-13: direct Function URL hits
            # without x-picasso-cf-origin now 403. Route the smoke through CF
            # so the header is injected. CF /Master_Function* routes to MFS;
            # action=health_check works without tenant.
            # Since the 2.5 Wave-2 CF origin flip (picasso#505), CF routes
            # to the bare function — this smoke validates the freshly
            # deployed function through the public path.
            smoke_base_url: 'https://staging.chat.myrecruiter.ai'
            smoke_path: '/Master_Function?action=health_check'
            smoke_expect_status: '200'
            smoke_invoke_event: ''
          - source_dir: Bedrock_Streaming_Handler_Staging
            # Node.js Lambda — esbuild bundles dependencies into a single
            # dist/index.js; npm run package zips it. Different deploy flow
            # from Python entries (see Package function (Node.js) step below).
            # Task 2.5: de-suffixed (see the Master_Function entry's note —
            # same source-dir-stays / function-renames seam).
            staging_function: Bedrock_Streaming_Handler
            handler: index.handler
            runtime: nodejs
            # Not used for Node.js entries — esbuild controls what's bundled
            # via Bedrock_Streaming_Handler_Staging/esbuild.config.mjs. The
            # package step branches on runtime; this field is ignored when
            # runtime == nodejs.
            include_globs: ''
            # BEDROCK_MODEL_ID single source of truth per Phase 4 EC-P4-2.
            # BSH code fails loud at module load if this is missing (throws
            # in index.js initialization).
            env_vars: 'BEDROCK_MODEL_ID=global.anthropic.claude-haiku-4-5-20251001-v1:0'
            # Phase D cutover (2026-05-15): direct Function URL hits without
            # x-picasso-cf-origin now 403. Route smoke through CF (which
            # injects the header on origin `picasso-streaming-lambda`).
            # Mirrors the MFS pattern above. Closes Phase C YIELD-2 noise.
            # Since the 2.5 Wave-2 CF origin flip (picasso#505) this
            # validates the freshly deployed bare function — MFS note above.
            smoke_base_url: 'https://staging.chat.myrecruiter.ai'
            smoke_path: '/stream'
            smoke_expect_status: '200'
            smoke_invoke_event: ''
          - source_dir: SMS_Sender
            # Phase B (BSH staging-twin): Node.js Lambda invoked by BSH
            # form_handler.js (line 352, 845) for SMS sends via Telnyx.
            # No `_Staging` suffix per uniform-env-rules — staging account
            # boundary is the env separation. Code source mirrors prod;
            # different Telnyx credentials (separate Telnyx account) live
            # in picasso/telnyx-staging secret.
            #
            # Node.js Lambda — but unlike BSH it does NOT use esbuild. Its
            # package.json `npm run package` does `npm ci --production &&
            # zip -r deployment.zip .` (vendored node_modules). The runtime
            # branches on this entry's runtime field; nodejs path runs that
            # `npm run package` directly.
            staging_function: SMS_Sender
            handler: index.handler
            runtime: nodejs
            include_globs: ''
            # Env vars managed by Phase B Terraform module (lambda-sms-twin-staging).
            # Empty here keeps Terraform as single source of truth, matching
            # Analytics_Event_Processor + Analytics_Dashboard_API entries above.
            env_vars: ''
            # Smoke skipped pre-P-0: handler would attempt Secrets Manager
            # GetSecretValue + Telnyx API call with placeholder credentials
            # and throw. Real smoke happens via EC-B.9 post-procurement
            # (direct aws lambda invoke with real to/body payload).
            smoke_path: ''
            smoke_expect_status: ''
            smoke_invoke_event: ''
          - source_dir: SMS_Webhook_Handler
            # Phase B (BSH staging-twin): Node.js Lambda receiving Telnyx
            # delivery webhooks via public Function URL. AuthType: NONE at
            # URL layer; Ed25519 signature verification in handler code.
            #
            # Same packaging pattern as SMS_Sender — vendored node_modules
            # via npm ci --production + zip. No esbuild.
            staging_function: SMS_Webhook_Handler
            handler: index.handler
            runtime: nodejs
            include_globs: ''
            # Env vars managed by Phase B Terraform module.
            env_vars: ''
            # Smoke skipped pre-P-0: handler reads TELNYX_PUBLIC_KEY from
            # the secret (placeholder pre-procurement). Real smoke happens
            # via EC-B.10 post-procurement (Telnyx-signed POST to Function URL).
            smoke_path: ''
            smoke_expect_status: ''
            smoke_invoke_event: ''
          - source_dir: Meta_Webhook_Handler
            # Meta Messenger project — Node.js Lambda, esbuild bundle (same
            # packaging as Bedrock_Streaming_Handler_Staging). Public Function
            # URL; HMAC-SHA256 verify in handler. Env vars Terraform-managed
            # (lambda-meta-staging module) — matrix env_vars empty keeps
            # Terraform the single source of truth.
            staging_function: Meta_Webhook_Handler
            handler: index.handler
            runtime: nodejs
            include_globs: ''
            env_vars: ''
            # Smoke skipped: a GET without a valid hub.verify_token 403s by
            # design. Real end-to-end validation is Phase C (Meta App
            # Dashboard webhook challenge + live message).
            smoke_path: ''
            smoke_expect_status: ''
            smoke_invoke_event: ''
          - source_dir: Meta_Response_Processor
            # Meta Messenger project — Node.js Lambda, esbuild bundle.
            # Async-invoked by Meta_Webhook_Handler (no Function URL). Reuses
            # shared/bedrock-core for cross-account KB (@aws-sdk/credential-
            # providers bundled per #127). Env vars Terraform-managed.
            staging_function: Meta_Response_Processor
            handler: index.handler
            runtime: nodejs
            include_globs: ''
            env_vars: ''
            # Smoke skipped: a synthetic invoke would attempt KMS decrypt +
            # Bedrock + Meta Send API and throw (matches SMS_Sender rationale).
            # Real validation is Phase C4 (live Messenger message → KB reply).
            smoke_path: ''
            smoke_expect_status: ''
            smoke_invoke_event: ''
          - source_dir: Meta_OAuth_Handler
            # Meta Messenger project — Python Lambda (OAuth connect/callback +
            # channels mgmt). Public Function URL. PyJWT ships via
            # requirements-layer.txt (the Python package step reads that file,
            # NOT requirements.txt). Env vars Terraform-managed.
            staging_function: Meta_OAuth_Handler
            handler: lambda_function.lambda_handler
            runtime: python
            include_globs: 'lambda_function.py'
            env_vars: ''
            # Smoke skipped: routes are signed-state-JWT / Clerk-JWT gated;
            # a bare probe is non-deterministic. Real validation is Phase C1
            # (live OAuth connect of the operator test Page).
            smoke_path: ''
            smoke_expect_status: ''
            smoke_invoke_event: ''
          - source_dir: Calendar_Watch_Listener
            # Scheduling sub-phase B Task B2 — Node.js Lambda, esbuild bundle.
            # Public Function URL; Google Calendar push receiver. Env vars
            # Terraform-managed (lambda-calendar-watch-listener-staging module
            # in picasso infra/). Same nodejs packaging path as Meta_Webhook.
            staging_function: Calendar_Watch_Listener
            handler: index.handler
            runtime: nodejs
            include_globs: ''
            env_vars: ''
            # Smoke: GET returns 200 (no challenge from Google for Calendar
            # push channels; the handler responds 200 to any GET probe).
            # POST smoke would need a valid X-Goog-Channel-Token + DDB row
            # (Phase C5 integration test territory).
            smoke_path: ''
            smoke_expect_status: ''
            smoke_invoke_event: ''
          - source_dir: Calendar_Watch_Onboarder
            # Scheduling sub-phase B Task B5 — Node.js Lambda, esbuild bundle.
            # Direct-invoke (no Function URL); registers an initial Google
            # Calendar watch channel for (tenant_id, coordinator_id). Env vars
            # Terraform-managed in picasso infra/ module
            # lambda-calendar-watch-onboarder-staging. Same packaging path as
            # Calendar_Watch_Listener.
            staging_function: Calendar_Watch_Onboarder
            handler: index.handler
            runtime: nodejs
            include_globs: ''
            env_vars: ''
            # No HTTP frontend; smoke is operator-driven via
            #   aws lambda invoke --function-name Calendar_Watch_Onboarder
            # against a live OAuth-provisioned coordinator. Automated smoke
            # would require a stable test fixture (sub-phase E scope).
            smoke_path: ''
            smoke_expect_status: ''
            smoke_invoke_event: ''
          - source_dir: Calendar_Watch_Renewer
            # Scheduling sub-phase B Task B3 — Node.js Lambda, esbuild bundle.
            # EventBridge-Scheduler-driven (every ~6h, B4); re-watches Google
            # Calendar push channels approaching expiry. No Function URL. Env
            # vars Terraform-managed in picasso infra/ module
            # lambda-calendar-watch-renewer-staging. Same packaging path as
            # Calendar_Watch_Onboarder.
            staging_function: Calendar_Watch_Renewer
            handler: index.handler
            runtime: nodejs
            include_globs: ''
            env_vars: ''
            # No HTTP frontend; smoke is operator-driven via
            #   aws lambda invoke --function-name Calendar_Watch_Renewer
            # after seeding a near-expiry channel. Automated smoke would
            # require a stable test fixture (sub-phase E scope).
            smoke_path: ''
            smoke_expect_status: ''
            smoke_invoke_event: ''
          - source_dir: Calendar_Watch_Offboarder
            # Scheduling sub-phase B Task B6 — Node.js Lambda, esbuild bundle.
            # Direct-invoke (no Function URL); channels.stop + delete the DDB row
            # when a coordinator is no longer bookable. Env vars Terraform-managed
            # in picasso infra/ module lambda-calendar-watch-offboarder-staging.
            # Same packaging path as Calendar_Watch_Renewer.
            staging_function: Calendar_Watch_Offboarder
            handler: index.handler
            runtime: nodejs
            include_globs: ''
            env_vars: ''
            # No HTTP frontend; smoke is operator-driven via
            #   aws lambda invoke --function-name Calendar_Watch_Offboarder
            # against a live channel (mint via Onboarder, tear down here).
            # Automated smoke would require a stable test fixture (sub-phase E).
            smoke_path: ''
            smoke_expect_status: ''
            smoke_invoke_event: ''
          - source_dir: Booking_Commit_Handler
            # Scheduling sub-phase C Task C8 — the booking-commit keystone.
            # Node.js Lambda, esbuild bundle (npm run package = node
            # esbuild.config.mjs + zip -j deployment.zip dist/index.js). UNIQUE
            # vs the sibling scheduling Lambdas: C8 bundles ../shared/scheduling/*
            # (pool/routing/availability/tokens), so esbuild needs those deps
            # installed first — see the "Install shared/scheduling deps" step
            # below (gated on this source_dir). Env vars Terraform-managed in
            # picasso infra/ module lambda-booking-commit-staging.
            staging_function: Booking_Commit_Handler
            handler: index.handler
            runtime: nodejs
            include_globs: ''
            env_vars: ''
            # No HTTP frontend (invoked by the conversational flow, not a public
            # URL). Live smoke is operator-supervised via the integrator's
