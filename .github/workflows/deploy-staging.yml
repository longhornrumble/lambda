            smoke_invoke_event: ''
          - source_dir: Scheduled_Message_Sender
            # Track 1 S6 — the EventBridge schedule target that sends reminder email/SMS.
            # Node.js esbuild bundle (ESM dist/index.mjs); bundles ../shared/scheduling/channels.js
            # with @aws-sdk/* externalized, so — like the calendar consumers — NO shared/scheduling
            # npm install. shared-only change → manual trigger:
            #   gh workflow run "Deploy Lambda — Staging" -f lambda=Scheduled_Message_Sender
            # Created by picasso infra PR-A (placeholder). Env vars Terraform-managed
            # (infra/ lambda-scheduled-message-sender-staging).
            staging_function: Scheduled_Message_Sender
            handler: index.handler
            runtime: nodejs
            include_globs: ''
            env_vars: ''
            # EventBridge-Scheduler-invoked with a {pk,sk,message_id} payload; a synthetic invoke
            # would attempt a real DDB read + send_email/SMS_Sender fan-out. No synthetic smoke.
