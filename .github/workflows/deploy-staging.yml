            include_globs: 'lambda_function.py'
            env_vars: ''
            smoke_path: ''
            smoke_expect_status: ''
            # Empty Records list exercises cold-start + handler entry with no side effects.
            # Matches the Analytics_Event_Processor + picasso_session_archiver pattern.
            smoke_invoke_event: '{"Records":[]}'
          - source_dir: Attribution_Recap_Generator
            # Mission Intelligence Wave 2 -- Python 3.13 Lambda; monthly EventBridge schedule.
            # Reads prior-month attribution-aggregates rows and dispatches recap emails via
