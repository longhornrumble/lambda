name: Deploy Lambda — Production

# Manual promotion to production. Run this AFTER verifying the same
# code on staging.
#
# Prod model: code lives on $LATEST; publish-version on every deploy creates
# an immutable audit-trail snapshot (no aliases reference it). Rollback =
# redeploy a previous commit via this workflow with `git_ref` override.
#
# See feedback_uniform_env_rules.md.

on:
  workflow_dispatch:
    inputs:
      lambda:
        description: Lambda to promote
        type: choice
        required: true
        options:
          - Analytics_Dashboard_API
      git_ref:
        description: Git ref to deploy (default = main HEAD)
        type: string
        required: false
        default: main
      release_note:
        description: Release note (appended to version description)
        type: string
        required: false
        default: ''

concurrency:
  group: deploy-prod-${{ github.event.inputs.lambda }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Promote ${{ github.event.inputs.lambda }} to production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        lambda:
          - source_dir: Analytics_Dashboard_API
            prod_function: Analytics_Dashboard_API
            include_globs: 'lambda_function.py tenant_registry_ops.py'
            smoke_path: /forms/summary
            smoke_expect_status: '401'
    steps:
      - name: Guard — only handle the selected Lambda
        if: matrix.lambda.source_dir != github.event.inputs.lambda
        run: |
          echo "Skipping ${{ matrix.lambda.source_dir }} (selected: ${{ github.event.inputs.lambda }})"
          exit 0

      - uses: actions/checkout@v4
        if: matrix.lambda.source_dir == github.event.inputs.lambda
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Configure AWS credentials
        if: matrix.lambda.source_dir == github.event.inputs.lambda
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package function
        if: matrix.lambda.source_dir == github.event.inputs.lambda
        working-directory: ${{ matrix.lambda.source_dir }}
        run: |
          set -euo pipefail
          zip -q -r9 /tmp/deploy.zip ${{ matrix.lambda.include_globs }}
          echo "Packaged $(unzip -l /tmp/deploy.zip | tail -1)"

      # Note: the previous "compare local SHA to staging $LATEST" safety check
      # was removed when staging Lambda moved out of this AWS account into the
      # staging account (525409062831). The check would need cross-account
      # credentials to resolve the staging $LATEST SHA. If that safety net is
      # wanted back, add a step that assumes the staging-account read role
      # before this step.

      - name: Update function code
        if: matrix.lambda.source_dir == github.event.inputs.lambda
        run: |
          set -euo pipefail
          aws lambda update-function-code \
            --function-name ${{ matrix.lambda.prod_function }} \
            --zip-file fileb:///tmp/deploy.zip \
            --no-publish \
            --query '{State:State, LastUpdateStatus:LastUpdateStatus}'
          aws lambda wait function-updated \
            --function-name ${{ matrix.lambda.prod_function }}

      - name: Publish version (audit trail)
        if: matrix.lambda.source_dir == github.event.inputs.lambda
        id: publish
        run: |
          set -euo pipefail
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          NOTE="PROD: ${COMMIT_MSG} (${COMMIT_SHA:0:7})"
          if [ -n "${{ github.event.inputs.release_note }}" ]; then
            NOTE="${NOTE} | ${{ github.event.inputs.release_note }}"
          fi
          NOTE=${NOTE:0:256}
          NEW_VERSION=$(aws lambda publish-version \
            --function-name ${{ matrix.lambda.prod_function }} \
            --description "$NOTE" \
            --query Version --output text)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "note=$NOTE" >> "$GITHUB_OUTPUT"
          echo "Published v$NEW_VERSION: $NOTE"

      - name: Smoke test
        if: matrix.lambda.source_dir == github.event.inputs.lambda
        run: |
          set -euo pipefail
          # Deterministic: filter for the unaliased ($LATEST) URL config.
          # Aliased entries have a Qualifier field; the $LATEST entry does not.
          # Tolerates transitional state where alias URLs still exist.
          URL=$(aws lambda list-function-url-configs \
            --function-name ${{ matrix.lambda.prod_function }} \
            --query 'FunctionUrlConfigs[?!Qualifier].FunctionUrl | [0]' --output text)
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${URL%/}${{ matrix.lambda.smoke_path }}")
          echo "Smoke: GET ${URL%/}${{ matrix.lambda.smoke_path }} → $STATUS"
          if [ "$STATUS" != "${{ matrix.lambda.smoke_expect_status }}" ]; then
            echo "::error::Expected ${{ matrix.lambda.smoke_expect_status }}, got $STATUS"
            exit 1
          fi

      - name: Summary
        if: matrix.lambda.source_dir == github.event.inputs.lambda
        run: |
          echo "### Promoted ${{ matrix.lambda.prod_function }} to production" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Code:** \$LATEST (snapshot v${{ steps.publish.outputs.new_version }} for audit)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Note:** ${{ steps.publish.outputs.note }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Smoke:** passed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Rollback: re-run this workflow with \`git_ref\` set to a previous commit (e.g. \`gh workflow run deploy-production.yml -f lambda=${{ matrix.lambda.prod_function }} -f git_ref=<prev-sha>\`)" >> "$GITHUB_STEP_SUMMARY"
