name: Deploy Lambda — Production

# Manual promotion to production. Run this AFTER verifying the same
# code on staging.
#
# Prod models (per function — see matrix `alias` field):
#   - $LATEST model (ADA, BSH): code lives on $LATEST; publish-version on every
#     deploy creates an immutable audit-trail snapshot (no aliases reference
#     it). Rollback = redeploy a previous commit via this workflow with
#     `git_ref` override.
#   - alias model (MFS): prod traffic enters via API Gateway → the `live`
#     alias. Deploy = update code → publish version → flip `live` to the new
#     version. Rollback = flip `live` back to the previous version (one
#     command, printed in the run summary). Discovered the hard way
#     (CI-modernization Phase 1, 2026-06-09): a deploy that only updates
#     $LATEST does NOT reach MFS prod traffic — the §P5.1 2026-06-07 manual
#     deploy left the alias on v21 while $LATEST carried the new code.
#
# Env vars are NOT managed here (unlike deploy-staging.yml): prod BSH function
# config is Terraform-owned (infra/modules/bsh-function-prod — one writer per
# resource); prod MFS env is hand-managed until the MFS-prod module exists.
# Code flows through this workflow; resource shape does not.
#
# See feedback_uniform_env_rules.md.

on:
  workflow_dispatch:
    inputs:
      lambda:
        description: Lambda to promote (prod function name)
        type: choice
        required: true
        options:
          - Analytics_Dashboard_API
          - Master_Function
          - Bedrock_Streaming_Handler
      git_ref:
        description: Git ref to deploy (default = main HEAD)
        type: string
        required: false
        default: main
      release_note:
        description: Release note (appended to version description)
        type: string
        required: false
        default: ''

concurrency:
  group: deploy-prod-${{ github.event.inputs.lambda }}
  # Queued runs wait, never cancel a mid-flight deploy. Caveat (audit N4): a
  # queued second dispatch WILL run on top of a failed first run's $LATEST —
  # if a run fails, cancel anything queued behind it before investigating.
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  # Keep MANUALLY in sync with the BSH function's runtime (nodejs20.x today).
  # There is no mechanical coupling (audit C3): bumping the Lambda runtime
  # does not update this, and vice versa — change both together.
  NODE_VERSION: '20.x'

jobs:
  deploy:
    name: Promote ${{ github.event.inputs.lambda }} to production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        lambda:
          - source_dir: Analytics_Dashboard_API
            prod_function: Analytics_Dashboard_API
            runtime: python
            include_globs: 'lambda_function.py tenant_registry_ops.py'
            alias: ''
            # ADA smokes against its own Function URL (looked up at deploy
            # time); MFS/BSH smoke through CloudFront instead (smoke_url).
            smoke_url: ''
            smoke_path: /forms/summary
            smoke_expect_status: '401'
          - source_dir: Master_Function_Staging
            # Code dir keeps the historical `_Staging` suffix; the prod-account
            # function is bare-named (see deploy-staging.yml entry for the
            # naming history). Same code, different account.
            prod_function: Master_Function
            runtime: python
            # KEEP IN SYNC with the deploy-staging.yml MFS entry. The
            # zip-manifest guard below fails the run if a tracked runtime .py
            # is missing from this list (the include_globs landmine that cost
            # §P5.1 twice — reference_lambda_deploy_include_globs_allowlist).
            include_globs: >-
              analytics_writer.py
              audit_logger.py
              aws_client_manager.py
              bedrock_handler_optimized.py
              contact_extractor.py
              conversation_handler.py
              form_cta_enhancer.py
              form_handler.py
              intent_router.py
              lambda_function.py
              pii_subject.py
              redact_pii.py
              response_formatter.py
              session_utils.py
              template_renderer.py
              tenant_config_loader.py
              tenant_inference.py
              tenant_registry.py
              token_blacklist.py
              jwt
              PyJWT-2.10.1.dist-info
              notification_templates.json
              analytics_writer_contract.json
            # Prod traffic = API GW kgvc8xnewf → Master_Function:live. The
            # alias flip below is what actually ships the deploy.
            #
            # publish-version FREEZES $LATEST's env vars into the version the
            # alias will serve. Before dispatching after any out-of-band env
            # change, sanity-check prod $LATEST env (e.g. scripts/whats-live.sh
            # + get-function-configuration). First-dispatch pre-flight done
            # 2026-06-09: §P5.1 keys (PII_SUBJECT_INDEX_TABLE,
            # FORM_SUBMISSIONS_TABLE) + fail-loud keys (BEDROCK_MODEL_ID,
            # STREAMING_ENDPOINT) all present; KB_RETRIEVER_ROLE_ARN absent by
            # design (environ.get with same-account fallback).
            alias: live
            # action=health_check returns 200 unauthenticated; routed through
            # CloudFront (which injects x-picasso-cf-origin). Mirrors staging.
            smoke_url: 'https://chat.myrecruiter.ai/Master_Function?action=health_check'
            smoke_path: ''
            smoke_expect_status: '200'
          - source_dir: Bedrock_Streaming_Handler_Staging
            prod_function: Bedrock_Streaming_Handler
            # Node.js — esbuild bundles to a single dist/index.js; `npm run
            # package` zips it. Needs devDependencies (esbuild), so plain
            # `npm ci`, NOT --production (which fails — esbuild is a devDep).
            runtime: nodejs
            include_globs: ''
            # No alias: the Function URL (AuthType=AWS_IAM behind the
            # CloudFront /stream Lambda@Edge signer, Remedy A #435) serves
            # $LATEST. update-function-code switches traffic immediately;
            # the published version is the rollback snapshot (v25/v26
            # convention from the §P5.1 promote).
            alias: ''
            # Through CloudFront so the SigV4 signer + cf-origin header apply.
            # Smoke depth (audit C1): a 200 here is NOT just CF-layer health —
            # the request invokes the Lambda through the Function URL, so a
            # bundle that fails at module load returns 502 and fails the
            # smoke. What it does NOT prove: Bedrock connectivity or a real
            # streaming conversation (that's the operator's post-deploy
            # widget check / the BSH ops alarms).
            smoke_url: 'https://chat.myrecruiter.ai/stream'
            smoke_path: ''
            smoke_expect_status: '200'
    steps:
      - name: Guard — only handle the selected Lambda
        if: matrix.lambda.prod_function != github.event.inputs.lambda
        run: |
          echo "Skipping ${{ matrix.lambda.prod_function }} (selected: ${{ github.event.inputs.lambda }})"
          exit 0

      - uses: actions/checkout@v4
        if: matrix.lambda.prod_function == github.event.inputs.lambda
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Setup Node.js
        if: matrix.lambda.prod_function == github.event.inputs.lambda && matrix.lambda.runtime == 'nodejs'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.lambda.source_dir }}/package-lock.json

      - name: Configure AWS credentials
        if: matrix.lambda.prod_function == github.event.inputs.lambda
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package function (Python)
        if: matrix.lambda.prod_function == github.event.inputs.lambda && matrix.lambda.runtime == 'python'
        working-directory: ${{ matrix.lambda.source_dir }}
        run: |
          set -euo pipefail
          zip -q -r9 /tmp/deploy.zip ${{ matrix.lambda.include_globs }}
          echo "Packaged $(unzip -l /tmp/deploy.zip | tail -1)"

      - name: Package function (Node.js)
        if: matrix.lambda.prod_function == github.event.inputs.lambda && matrix.lambda.runtime == 'nodejs'
        working-directory: ${{ matrix.lambda.source_dir }}
        run: |
          set -euo pipefail
          # Per-Lambda `package.json` controls what `npm run package` does.
          # BSH: esbuild bundle → zip deployment.zip (single dist/index.js).
          # Mirrors deploy-staging.yml's Node path exactly.
          npm ci
          npm run package
          cp deployment.zip /tmp/deploy.zip
          echo "Packaged $(unzip -l /tmp/deploy.zip | tail -1)"

      - name: Zip-manifest guard (Python)
        if: matrix.lambda.prod_function == github.event.inputs.lambda && matrix.lambda.runtime == 'python'
        run: |
          set -euo pipefail
          # The include_globs allowlist silently DROPS any runtime file that
          # isn't listed (cost §P5.1 twice). Fail loudly instead: every
          # tracked .py/.json in the source dir must be inside the zip, except
          # non-deployed classes: tests (test_*, run_*, conftest) and one-off
          # ops scripts (backfill_*, create_*, migrate_* — table-creation and
          # backfill utilities live in the repo but never ship). New
          # non-deployed file classes extend that exclusion regex.
          # unzip -Z1 = one filename per line (space-safe, unlike awk on -l).
          # Fire-tested 2026-06-09 (audit C4): a zip built without
          # pii_subject.py failed the guard as designed.
          SRC='${{ matrix.lambda.source_dir }}'
          MISSING=0
          while IFS= read -r f; do
            rel="${f#"$SRC"/}"
            if ! unzip -Z1 /tmp/deploy.zip | grep -qx "$rel"; then
              echo "::error file=$f::Tracked runtime file missing from deploy zip — add it to include_globs (in BOTH deploy-staging.yml and deploy-production.yml)"
              MISSING=1
            fi
          done < <(git ls-files -- "$SRC/" | grep -E '\.(py|json)$' | grep -vE '(^|/)(test_|run_|conftest|backfill_|create_|migrate_)[^/]*\.(py|json)$')
          if [ "$MISSING" -eq 0 ]; then echo "Zip-manifest guard: all tracked runtime files present."; fi
          exit $MISSING

      # Note: the previous "compare local SHA to staging $LATEST" safety check
      # was removed when staging Lambda moved out of this AWS account into the
      # staging account (525409062831). The check would need cross-account
      # credentials to resolve the staging $LATEST SHA. If that safety net is
      # wanted back, add a step that assumes the staging-account read role
      # before this step.

      - name: Update function code
        if: matrix.lambda.prod_function == github.event.inputs.lambda
        run: |
          set -euo pipefail
          aws lambda update-function-code \
            --function-name ${{ matrix.lambda.prod_function }} \
            --zip-file fileb:///tmp/deploy.zip \
            --no-publish \
            --query '{State:State, LastUpdateStatus:LastUpdateStatus}'
          aws lambda wait function-updated \
            --function-name ${{ matrix.lambda.prod_function }}

      # Re-running a failed run re-uploads the same zip and publishes a NEW
      # version number with identical code (audit C2) — benign duplicate in
      # the version history; re-run is the intended recovery action.
      - name: Publish version (audit trail / rollback snapshot)
        if: matrix.lambda.prod_function == github.event.inputs.lambda
        id: publish
        run: |
          set -euo pipefail
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          NOTE="PROD: ${COMMIT_MSG} (${COMMIT_SHA:0:7})"
          if [ -n "${{ github.event.inputs.release_note }}" ]; then
            NOTE="${NOTE} | ${{ github.event.inputs.release_note }}"
          fi
          NOTE=${NOTE:0:256}
          NEW_VERSION=$(aws lambda publish-version \
            --function-name ${{ matrix.lambda.prod_function }} \
            --description "$NOTE" \
            --query Version --output text)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "note=$NOTE" >> "$GITHUB_OUTPUT"
          echo "Published v$NEW_VERSION: $NOTE"

      - name: Flip traffic alias
        if: matrix.lambda.prod_function == github.event.inputs.lambda && matrix.lambda.alias != ''
        id: alias
        run: |
          set -euo pipefail
          PREV=$(aws lambda get-alias \
            --function-name ${{ matrix.lambda.prod_function }} \
            --name ${{ matrix.lambda.alias }} \
            --query FunctionVersion --output text)
          echo "prev_version=$PREV" >> "$GITHUB_OUTPUT"
          # Defensive: ensure the just-published version is fully active
          # before pointing traffic at it (publish is usually synchronous;
          # large functions can lag).
          aws lambda wait published-version-active \
            --function-name ${{ matrix.lambda.prod_function }} \
            --qualifier ${{ steps.publish.outputs.new_version }}
          aws lambda update-alias \
            --function-name ${{ matrix.lambda.prod_function }} \
            --name ${{ matrix.lambda.alias }} \
            --function-version ${{ steps.publish.outputs.new_version }} \
            --query '{Alias:Name,NowServing:FunctionVersion}'
          echo "Alias ${{ matrix.lambda.alias }}: v$PREV → v${{ steps.publish.outputs.new_version }}"

      - name: Smoke test
        if: matrix.lambda.prod_function == github.event.inputs.lambda
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.lambda.smoke_url }}" ]; then
            URL="${{ matrix.lambda.smoke_url }}"
          else
            # Deterministic: filter for the unaliased ($LATEST) URL config.
            # Aliased entries have a Qualifier field; the $LATEST entry does not.
            BASE=$(aws lambda list-function-url-configs \
              --function-name ${{ matrix.lambda.prod_function }} \
              --query 'FunctionUrlConfigs[?!Qualifier].FunctionUrl | [0]' --output text)
            URL="${BASE%/}${{ matrix.lambda.smoke_path }}"
          fi
          # Cache-Control: request a CloudFront cache bypass so the smoke
          # exercises the origin (the just-deployed code), not a cached 200
          # from the previous version.
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -H 'Cache-Control: no-cache' "$URL")
          echo "Smoke: GET $URL → $STATUS"
          if [ "$STATUS" != "${{ matrix.lambda.smoke_expect_status }}" ]; then
            echo "::error::Expected ${{ matrix.lambda.smoke_expect_status }}, got $STATUS"
            exit 1
          fi

      - name: Roll alias back on failure
        # The alias model's whole point is instant rollback — make it
        # automatic. If anything failed AFTER the alias flipped (smoke,
        # typically), point traffic back at the previous version so a bad
        # deploy never sits live waiting for a human. ($LATEST-model
        # functions have no equivalent: rollback = redeploy a prior git_ref.)
        if: failure() && matrix.lambda.prod_function == github.event.inputs.lambda && matrix.lambda.alias != '' && steps.alias.outcome == 'success'
        run: |
          set -euo pipefail
          aws lambda update-alias \
            --function-name ${{ matrix.lambda.prod_function }} \
            --name ${{ matrix.lambda.alias }} \
            --function-version ${{ steps.alias.outputs.prev_version }} \
            --query '{Alias:Name,RolledBackTo:FunctionVersion}'
          echo "::error::Deploy failed after alias flip — alias ${{ matrix.lambda.alias }} AUTO-ROLLED-BACK to v${{ steps.alias.outputs.prev_version }}. \$LATEST and v${{ steps.publish.outputs.new_version }} still carry the new code; investigate, then redeploy."

      - name: Summary
        if: matrix.lambda.prod_function == github.event.inputs.lambda
        run: |
          echo "### Promoted ${{ matrix.lambda.prod_function }} to production" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ matrix.lambda.alias }}" ]; then
            echo "- **Traffic:** alias \`${{ matrix.lambda.alias }}\` → v${{ steps.publish.outputs.new_version }} (was v${{ steps.alias.outputs.prev_version }})" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Note:** ${{ steps.publish.outputs.note }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Smoke:** passed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Rollback (one command):" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
            echo "aws lambda update-alias --function-name ${{ matrix.lambda.prod_function }} --name ${{ matrix.lambda.alias }} --function-version ${{ steps.alias.outputs.prev_version }}" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **Code:** \$LATEST (snapshot v${{ steps.publish.outputs.new_version }} for audit)" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Note:** ${{ steps.publish.outputs.note }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Smoke:** passed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Rollback: re-run this workflow with \`git_ref\` set to a previous commit (e.g. \`gh workflow run deploy-production.yml -f lambda=${{ matrix.lambda.prod_function }} -f git_ref=<prev-sha>\`)" >> "$GITHUB_STEP_SUMMARY"
          fi
